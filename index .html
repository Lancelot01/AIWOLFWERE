// v0.6.29：終局執行官 / 獵人決勝日信任修正。
// 問題：好人 AI 會聽見玩家連續盤出狼坑並照投，最後卻因「票型追責」把正確玩家定狼。
// 修正：把「公開正確推狼軌跡」轉成可執行信用，尤其三人/四人殘局與獵人位不得無視。
function publicPushedSeat(actorSeat,targetSeat,throughDay=G.day){
  return (G.aiJudgements||[]).some(j=>j.by===actorSeat&&j.target===targetSeat&&j.day<=throughDay&&
    /speechAccuse|speechVoteIntent|deathAccuse|seerChainConfirmed/.test(j.type));
}
function votedSeatOnDay(actorSeat,targetSeat,day){
  const vh=(G.voteHistory||[]).find(v=>v.day===day);
  return !!(vh&&vh.ballots&&vh.ballots.some(b=>b.v===actorSeat&&b.t===targetSeat));
}
function publicWolfishByChain(bot,targetSeat){
  const p=seatOf(targetSeat); if(!p)return false;
  if(p.revealed==='wolf')return true;
  if(isRevealedFakeSeerClaim(p))return true;
  if(seerChainWolfModifier(bot,targetSeat)>0.52)return true;
  if(confirmedGoodSeerClaims().some(q=>(q.claimChecks||[]).some(c=>c.target===targetSeat&&c.wolf)))return true;
  if((G.aiJudgements||[]).some(j=>j.type==='seerChainConfirmed'&&j.target===targetSeat&&j.kind==='wolf'))return true;
  return false;
}
function publicGoodByChain(bot,targetSeat){
  const p=seatOf(targetSeat); if(!p)return false;
  if(p.revealed==='good')return true;
  if(isProtectedPublicInfoSeat(bot,p))return true;
  if(confirmedGoodSeerClaims().some(q=>(q.claimChecks||[]).some(c=>c.target===targetSeat&&!c.wolf)))return true;
  if((G.aiJudgements||[]).some(j=>j.type==='seerChainConfirmed'&&j.target===targetSeat&&j.kind==='good'))return true;
  return false;
}
function publicReadCredit(bot,seat){
  // 只看公開事件：發言點名、投票、已成立的預言家鏈；不偷看真身分。
  let credit=0, debt=0;
  G.players.forEach(t=>{
    if(!t||t.seat===seat)return;
    const wolfish=publicWolfishByChain(bot,t.seat);
    const goodish=publicGoodByChain(bot,t.seat);
    if(wolfish){
      if(publicPushedSeat(seat,t.seat))credit+=0.34;
      const outDay=t.deathDay||G.day;
      if(votedSeatOnDay(seat,t.seat,outDay))credit+=0.38;
      // 即使沒出局，只要連續把硬鏈狼坑點出，也要算信用。
      const pushes=(G.aiJudgements||[]).filter(j=>j.by===seat&&j.target===t.seat&&/speechAccuse|speechVoteIntent/.test(j.type)).length;
      if(pushes>=2)credit+=0.18;
    }
    if(goodish){
      if(publicPushedSeat(seat,t.seat))debt+=0.22;
      const outDay=t.deathDay||G.day;
      if(votedSeatOnDay(seat,t.seat,outDay))debt+=0.24;
    }
  });
  // 被已證假預發金水不是定狼，但在終局要進回看；反之，主動推過假預則加信用。
  G.players.filter(isRevealedFakeSeerClaim).forEach(f=>{
    if(publicPushedSeat(seat,f.seat)||votedSeatOnDay(seat,f.seat,f.deathDay||G.day))credit+=0.22;
    (f.claimChecks||[]).forEach(c=>{if(c.target===seat&&!c.wolf)debt+=0.16;});
  });
  return {credit:clamp(credit,0,1.8),debt:clamp(debt,0,1.8),net:clamp(credit-debt,-1.8,1.8)};
}
function askedToClaimToday(targetSeat){
  const txt=(G.speechLog||[]).filter(x=>x.day===G.day&&x.seat!==targetSeat).map(x=>x.text).join(' ');
  return new RegExp(`${targetSeat}\\s*號[^。；，,]*拍(身分|身份)|輪到${targetSeat}\\s*號[^。；，,]*拍`).test(txt);
}
function claimedRoleToday(targetSeat){
  const txt=speechTextOf(targetSeat,G.day)||'';
  return /(我是|我跳|底牌|拍)(預言家|通靈師|女巫|獵人|騎士|白癡|平民)/.test(txt);
}
function endgamePressureScore(bot,targetSeat){
  const p=seatOf(targetSeat); if(!p||p.seat===bot.seat||!p.alive)return -999;
  let s=0;
  const read=publicReadCredit(bot,targetSeat);
  s-=read.net*0.75; // 盤對狼坑的人，終局不得被「感覺票」硬定狼。
  if(read.debt>0.28)s+=read.debt*0.45;
  s+=Math.max(0,seerChainWolfModifier(bot,targetSeat))*1.1;
  if(publicWolfishByChain(bot,targetSeat))s+=1.15;
  if(publicGoodByChain(bot,targetSeat))s-=1.25;
  const today=speechTextOf(targetSeat,G.day)||'';
  const a=analyzeSpeechText(today);
  if(alive().length<=3){
    if(askedToClaimToday(targetSeat)&&!claimedRoleToday(targetSeat))s+=0.75;
    if(a.isLowInfo&&!claimedRoleToday(targetSeat))s+=0.38;
    // 三人局被要求拍身分，不能只說「中度懷疑/站邊接不上」。
    if(/中度懷疑|輕輕打一個問號|站邊.*接不上|先留觀察|不急著打死/.test(today)&&!claimedRoleToday(targetSeat))s+=0.42;
  }
  if(p.claim==='預言家'||p.claim==='通靈師')s+=Math.max(0,0.60-credOf(bot,targetSeat))*0.35;
  return s;
}
function finalDayVoteTarget(bot){
  if(!bot||isWolf(bot)||bot.noVote)return null;
  const living=alive();
  if(G.day<3||living.length>4)return null;
  const cands=living.filter(p=>p.seat!==bot.seat&&p.revealed!=='good'&&!isProtectedPublicInfoSeat(bot,p));
  if(!cands.length)return null;
  const rows=cands.map(p=>({seat:p.seat,score:votePriorityScore(bot,p.seat)+endgamePressureScore(bot,p.seat)}));
  rows.sort((a,b)=>b.score-a.score);
  const top=rows[0]; if(!top)return null;
  // 殘局寧可出「硬鏈/不拍身分/公開軌跡差」的人，不要把連續盤對的人用感覺票定狼。
  const topRead=publicReadCredit(bot,top.seat);
  if(top.score>=0.78&&topRead.net<0.95)return top.seat;
  const alt=rows.find(r=>publicReadCredit(bot,r.seat).net<0.35&&r.score>=top.score-0.28);
  return alt?alt.seat:top.seat;
}
function finalDayVoteReason(bot,targetSeat){
  if(!targetSeat||G.day<3||alive().length>4)return '';
  const read=publicReadCredit(bot,targetSeat);
  if(askedToClaimToday(targetSeat)&&!claimedRoleToday(targetSeat))return '決勝日被要求拍身分卻沒有正面拍，不能只用空話反打';
  if(publicWolfishByChain(bot,targetSeat))return '決勝日優先執行已成立的預言家/翻牌硬鏈';
  if(read.debt>read.credit+0.25)return '公開站邊軌跡偏差，決勝日需要先交代';
  return '決勝日不能只靠感覺票，需按公開軌跡收束狼坑';
}
function bestSeerChainTarget(bot){
  if(!seerChainActive())return null;
  ensureMind(bot);
  const legacy=trueSeerLegacyTargets(bot);
  if(legacy.length&&legacy[0].score>=1.05)return legacy[0].seat;
  if(!knownFakeSeerClaims().length&&!confirmedGoodSeerClaims().length)return null;
  const cand=alive().filter(p=>p.seat!==bot.seat&&p.revealed!=='good'&&!isProtectedPublicInfoSeat(bot,p));
  if(!cand.length)return null;
  const scored=cand.map(p=>({seat:p.seat,score:seerChainWolfModifier(bot,p.seat)+voteTraceHeat(bot,p.seat)+(bot.susp?.[p.seat]||0)*0.18}));
  scored.sort((a,b)=>b.score-a.score);
  return scored[0]&&scored[0].score>=0.48?scored[0].seat:null;
}
function resolveFakeSeerReveal(fakeSeat){
  const fake=seatOf(fakeSeat); if(!isRevealedFakeSeerClaim(fake))return;
  alive().filter(bot=>!bot.isHuman&&!isWolf(bot)).forEach(bot=>{
    ensureMind(bot);
    bot.cred[fakeSeat]=0.02;
    addMindNote(bot,fakeSeat,`${fakeSeat}號已翻狼，預言家身分破產`,-0.8);
    (fake.claimChecks||[]).forEach(c=>{
      const tp=seatOf(c.target); if(!tp||!tp.alive)return;
      if(c.wolf)adjSusp(bot,c.target,-0.42,`${fakeSeat}號已證假預曾查殺，反向偏好${c.target}號`);
      else adjSusp(bot,c.target,0.58,`${fakeSeat}號已證假預曾發金水，${c.target}號進反向狼坑`);
    });
    G.seerClaims.filter(s=>s!==fakeSeat).forEach(claimSeat=>{
      const q=seatOf(claimSeat); if(!q||!isSeerLikeClaim(q))return;
      const boosted=seerClaimWeight(bot,claimSeat);
      bot.cred[claimSeat]=Math.max(credOf(bot,claimSeat),boosted);
      addMindNote(bot,claimSeat,`${fakeSeat}號已證假預，${claimSeat}號預言家鏈可信度上升`,0.5);
      (q.claimChecks||[]).forEach(c=>{
        const tp=seatOf(c.target); if(!tp||!tp.alive)return;
        if(c.wolf)adjSusp(bot,c.target,0.72,`${claimSeat}號預言家鏈查殺${c.target}號，且${fakeSeat}號已證假預`);
        else adjSusp(bot,c.target,-0.50,`${claimSeat}號預言家鏈金水${c.target}號，且${fakeSeat}號已證假預`);
        G.aiJudgements.push({day:G.day,type:'seerChainConfirmed',by:claimSeat,target:c.target,kind:c.wolf?'wolf':'good',reason:`${fakeSeat}號已證假預，${claimSeat}號預言家鏈可信`});
      });
    });
  });
}
function beliefWolfProb(bot,seat){
  const p=seatOf(seat); if(!bot||!p||seat===bot.seat)return 0;
  ensureMind(bot);
  if(p.revealed==='wolf')return 0.99;
  if(p.revealed==='good')return 0.01;
  let s=bot.susp?.[seat]??0.3;
  s+=seerChainWolfModifier(bot,seat);
  s+=knownWolfVoteEvasionHeat(bot,seat);
  const cred=credOf(bot,seat);
  s+=Math.max(0,0.56-cred)*0.18;
  s-=Math.max(0,cred-0.62)*0.22;
  const st=getSpeechStats(seat);
  if(st?.falseAccuse>0)s+=0.16;
  if(st?.overGuaranteeTargets?.length)s+=0.08;
  if(G.aiJudgements.some(j=>j.type==='deathAccuse'&&j.target===seat))s+=0.10;
  if(G.aiJudgements.some(j=>j.type==='overGuarantee'&&j.by===seat))s+=0.12;
  if(p.claim==='預言家'||p.claim==='通靈師'){
    const cc=G.seerClaims.filter(x=>seatOf(x)?.alive).length;
    if(cc>=2)s+=Math.max(0,0.52-cred)*0.35;
    if(G.players.some(q=>!q.alive&&q.claim==='預言家'&&q.deathCause==='knife'&&q.seat!==seat))s+=0.18;
  }
  if(isPublicWitchInfoSeat(seat)&&!hasWitchCounterClaim())s-=0.28;
  const rc=playerReasoningCredit(seat);
  s+=rc.suspicion*0.70-rc.trust*0.65;
  if(isLowInfoOrCautiousSeat(seat)&&!hasHardSuspicionReason(bot,seat))s-=0.18;
  if(isWolf(bot)&&isWolf(p))s=G.fairMode?Math.min(s,0.18):0.02;
  return clamp(s,0.01,0.99);
}
function voteTraceHeat(bot,seat){
  let heat=0;
  (G.voteHistory||[]).slice(-4).forEach(vh=>{
    (vh.ballots||[]).forEach(b=>{
      if(b.v===seat){
        const target=seatOf(b.t);
        if(target?.revealed==='good')heat+=0.15+trainingBias('voteTraceWeak',0.04);
        if(target?.claim==='預言家'||target?.claim==='女巫')heat+=0.08;
      }
      if(b.t===seat)heat+=0.02;
    });
  });
  return heat;
}

function knownWolfVoteEvasionHeat(bot,seat){
  // 已翻狼被放逐後，回看當天沒有投狼、甚至投到真神/好人線的人。
  // 這不是硬定狼，只是讓 AI 能講出「為什麼今天會歸你」。
  let heat=0;
  const knownVotedWolves=G.players.filter(w=>w.revealed==='wolf'&&w.deathCause==='vote');
  knownVotedWolves.forEach(w=>{
    const vh=(G.voteHistory||[]).find(x=>x.day===w.deathDay)||null;
    if(!vh)return;
    const ownBallot=(vh.ballots||[]).find(b=>b.v===seat);
    if(ownBallot?.t===w.seat)return;
    heat+=ownBallot?0.12:0.16;
    const votedTarget=ownBallot?seatOf(ownBallot.t):null;
    if(votedTarget?.revealed==='good')heat+=0.08;
    if(votedTarget?.claim==='預言家'||votedTarget?.claim==='通靈師'||votedTarget?.claim==='女巫')heat+=0.06;
  });
  return heat;
}
function wolfVoteEvasionReason(seat){
  const lines=[];
  const knownVotedWolves=G.players.filter(w=>w.revealed==='wolf'&&w.deathCause==='vote');
  knownVotedWolves.forEach(w=>{
    const vh=(G.voteHistory||[]).find(x=>x.day===w.deathDay)||null;
    if(!vh)return;
    const ownBallot=(vh.ballots||[]).find(b=>b.v===seat);
    if(ownBallot?.t===w.seat)return;
    if(ownBallot){
      const tp=seatOf(ownBallot.t);
      lines.push(`第${vh.day}天${w.seat}號已翻狼時，${seat}號沒有投${w.seat}號，而是投${ownBallot.t}號${tp?.name||''}`);
    }else{
      lines.push(`第${vh.day}天${w.seat}號已翻狼時，${seat}號沒有進${w.seat}號票，選擇棄票/無票`);
    }
  });
  return lines;
}
function strongestEvidenceLine(bot,seat){
  const p=seatOf(seat); if(!p)return '無';
  if(p.revealed==='wolf')return '翻牌為狼';
  if(p.revealed==='good')return '翻牌為好人';
  const personal=strongestPersonalLine(bot,seat);
  if(personal)return personal;
  const notes=(bot?.keyQuotes?.[seat]||[]).slice(-2).map(x=>x.text);
  if(notes.length)return notes.join(' / ');
  const j=judgementForTarget(bot,seat);
  return j.reason||'發言與票型綜合判讀';
}

function scrubInternalReason(txt,target){
  let out=String(txt||'');
  // 公開紀事絕對不能暴露狼隊內部語言或「我明知他是好人仍投」這類上帝視角。
  if(/狼隊|隊友|切割|倒鉤|悍跳狼|自爆|戰術票/.test(out))out='票型與發言壓力需要回看';
  if(target?.revealed==='good'&&/已被證實為好人|清白|金水/.test(out))out='對他的站邊與票型仍有疑問';
  return out.replace(/隊友/g,'同場玩家').replace(/狼隊/g,'票型').replace(/倒鉤|切割/g,'站邊回看');
}
function sanitizePublicVoteReason(voter,targetSeat,reason){
  const raw=String(reason||'');
  const target=seatOf(targetSeat);
  if(!raw)return '';
  if(/狼隊|隊友|切割|倒鉤|悍跳狼|自爆|戰術票/.test(raw))return '票型與發言壓力需要回看';
  return scrubInternalReason(raw,target);
}
function explainVoteChoice(voter,targetSeat){
  if(!targetSeat)return `${voter.seat}號棄票：資訊不足，暫時不想暴民出人`;
  const target=seatOf(targetSeat); if(!target)return `${voter.seat}號→${targetSeat}：目標不存在`;
  const parts=[];
  const obligationReason=seerChainObligationReason(voter,targetSeat);
  if(obligationReason)parts.push(obligationReason);
  const finalReason=finalDayVoteReason(voter,targetSeat);
  if(finalReason)parts.push(finalReason);
  const chain=seerChainWolfModifier(voter,targetSeat);
  if(chain>0.35)parts.push('預言家鏈/翻牌回推指向他');
  const evasion=wolfVoteEvasionReason(targetSeat);
  if(evasion.length)parts.push(evasion[0]);
  const vt=voteTraceHeat(voter,targetSeat);
  if(vt>0.08)parts.push('票型追責偏高');
  const judge=judgementForTarget(voter,targetSeat);
  // 只有「懷疑理由」能當公開投票理由；不能把信任理由拿來解釋投票。
  if(judge?.kind==='suspect'&&judge?.reason&&!/綜合判讀|無明確資料/.test(judge.reason))parts.push(judge.reason);
  const personal=strongestPersonalLine(voter,targetSeat);
  if(personal&&!/直接攻防/.test(parts.join('；')))parts.push('與我有直接攻防');
  if(voter.wolfVoteReason&&isWolf(voter))parts.unshift(sanitizePublicVoteReason(voter,targetSeat,voter.wolfVoteReason));
  if(voter.llmVote===targetSeat&&voter.llmVoteReason)parts.push(sanitizePublicVoteReason(voter,targetSeat,`LLM意圖：${voter.llmVoteReason}`));
  const txt=(parts.filter(Boolean).map(x=>scrubInternalReason(x,target)).filter(Boolean).slice(0,2).join('；')||'綜合發言、身分可信度與票型判斷');
  return `${voter.seat}號→${targetSeat}：${txt}`;
}
function advancedMindSummary(bot){
  if(!bot||bot.isHuman)return '';
  ensureMind(bot);
  const rows=alive().filter(p=>p.seat!==bot.seat).map(p=>{
    const wolf=Math.round(beliefWolfProb(bot,p.seat)*100);
    const cred=Math.round(credOf(bot,p.seat)*100);
    const rc=playerReasoningCredit(p.seat);
    const credit=rc.notes.length?`／信用:${rc.notes.join('、')}`:'';
    const note=strongestEvidenceLine(bot,p.seat);
    return `${p.seat}號：狼面${wolf}%／身分可信${cred}%${credit}／依據：${note}`;
  }).sort((a,b)=>parseInt(b.match(/狼面(\d+)%/)?.[1]||0)-parseInt(a.match(/狼面(\d+)%/)?.[1]||0));
  return rows.slice(0,6).join('\n');
}
function updateAIMindsFromSpeechBrief(b,speaker){
  if(!b||!speaker)return;
  alive().filter(bot=>!bot.isHuman&&bot.seat!==speaker.seat).forEach(bot=>{
    ensureMind(bot);
    (b.suspects||[]).forEach(t=>{
      if(t===speaker.seat)return;
      if(t===bot.seat){
        const heavy=b.voteIntent===t?0.34:0.22;
        addHate(bot,speaker.seat,heavy,`${speaker.seat}號公開點名/踩我`);
        addPressure(bot,speaker.seat,heavy+0.10,`${speaker.seat}號把我推進焦點`);
        if(bot.voteRead?.[speaker.seat])bot.voteRead[speaker.seat].pushed++;
        return;
      }
      const delta=(b.voteIntent===t?0.06:0.035)*(speaker.revealed==='good'?1.15:1);
      if(canDiscussSeatNow(t)||hasPublicHardInfoSeat(t))adjSusp(bot,t,delta,`${speaker.seat}號點名${t}號`);
      if(bot.voteRead?.[speaker.seat])bot.voteRead[speaker.seat].pushed++;
    });
    (b.trusted||[]).forEach(t=>{
      if(t===bot.seat||t===speaker.seat)return;
      const cautious=/暫放|偏信|先信|保留/.test(b.summary||'');
      adjSusp(bot,t,cautious?-0.015:-0.035,`${speaker.seat}號${cautious?'保留式暫放':'信任'}${t}號`);
      if(bot.voteRead?.[speaker.seat])bot.voteRead[speaker.seat].defended++;
    });
    (b.observed||[]).forEach(t=>{if(t!==bot.seat&&t!==speaker.seat)addMindNote(bot,t,`${speaker.seat}號把${t}號列觀察/保留`,0.01);});
    const tags=b.behaviorTags||{};
    (tags.hook||[]).forEach(t=>{if(t!==bot.seat&&t!==speaker.seat){adjSusp(bot,t,0.055,`${speaker.seat}號指出${t}號可能倒鉤`);addMindNote(bot,t,`${speaker.seat}號提出倒鉤心路`,0.03);}});
    (tags.charge||[]).forEach(t=>{if(t!==bot.seat&&t!==speaker.seat)adjSusp(bot,t,0.07,`${speaker.seat}號指出${t}號衝鋒/硬保`);});
    (tags.lurk||[]).forEach(t=>{if(t!==bot.seat&&t!==speaker.seat)adjSusp(bot,t,0.025,`${speaker.seat}號指出${t}號潛水/低資訊`);});
    (tags.scapegoat||[]).forEach(t=>{if(t!==bot.seat&&t!==speaker.seat)addMindNote(bot,t,`${speaker.seat}號認為${t}號可能被抗推`,0.02);});
    (b.shifts||[]).forEach(s=>{if(s?.target&&s.target!==bot.seat&&s.target!==speaker.seat)addMindNote(bot,s.target,`${speaker.seat}號心路：${s.target}號由${s.from||'先前'}轉${s.to||'現在'}`,0.03);});
    if(b.voteIntent&&b.voteIntent!==speaker.seat){
      addMindNote(bot,speaker.seat,`${speaker.seat}號發言有投${b.voteIntent}號意圖`,0.03);
      if(b.voteIntent===bot.seat){
        addHate(bot,speaker.seat,0.30,`${speaker.seat}號明確要投我`);
        addPressure(bot,speaker.seat,0.34,`${speaker.seat}號明確要投我`);
      }
      if(bot.voteRead?.[speaker.seat])bot.voteRead[speaker.seat].voted++;
    }
    if(b.summary)addMindNote(bot,speaker.seat,b.summary,0);
  });
}
function strategicIntentLine(bot,target){
  if(!target)return '暫時不歸票，只整理資訊鏈與票型。';
  const j=judgementForTarget(bot,target);
  const prob=Math.round(beliefWolfProb(bot,target)*100);
  return `${target}號目前狼面約${prob}%，判讀：${j.reason}；發言要引用公開資訊，不要捏造不存在的矛盾。`;
}

function claimantSeats(role){return alive().filter(p=>p.claim===role).map(p=>p.seat);}
function verifiedKnightSeat(){const k=G.players.find(p=>p.claim==='騎士'&&p.revealed==='good'&&p.knightDuelResult==='wolf');return k?k.seat:null;}
function applyRoleClaimCredit(bot,ev){
  if(!bot||!ev||!ev.role||!ev.by)return;
  const role=ev.role, by=ev.by;
  const same=claimantSeats(role);
  if(role==='騎士'){
    const vk=verifiedKnightSeat();
    if(vk&&vk!==by){bot.cred[by]=Math.min(credOf(bot,by),0.05);adjSusp(bot,by,0.80,'假騎士撞上已驗牌真騎士');addMindNote(bot,by,`${by}號口頭跳騎士，但${vk}號已翻牌撞狼，信用大幅下降`,0.08);return;}
    bot.cred[by]=Math.max(credOf(bot,by),0.55);
    addMindNote(bot,by,`${by}號口頭跳騎士，只小幅加信用`,0.02);
    return;
  }
  if(role==='女巫'){
    if(same.length>=2){
      same.forEach(s=>{
        bot.cred[s]=Math.min(credOf(bot,s),0.55);
        addMindNote(bot,s,`女巫雙跳：${same.map(x=>x+'號').join('、')}中必有一狼，由女巫毒藥、銀水與票型判斷`,0.05);
      });
      adjSusp(bot,by,0.12,'女巫雙跳待分辨');
      return;
    }
    bot.cred[by]=Math.max(credOf(bot,by),0.80);
    addMindNote(bot,by,`${by}號單跳女巫，信用提高`,0.05);
    return;
  }
  if(role==='獵人'){
    if(same.length>=2){
      same.forEach(s=>addMindNote(bot,s,`獵人雙跳：${same.map(x=>x+'號').join('、')}需按發言、票型與死亡槍判斷`,0.03));
      adjSusp(bot,by,0.10,'獵人雙跳待分辨');
      return;
    }
    bot.cred[by]=Math.max(credOf(bot,by),0.70);
    addMindNote(bot,by,`${by}號單跳獵人，有中等信用但不是鐵好`,0.04);
    return;
  }
}

/* 事件廣播：所有存活bot（狼看真相，仍記錄用於「表演」與人類玩家判讀） */
function applyEvent(ev){
  alive().filter(b=>!b.isHuman&&b.seat!==ev.by).forEach(bot=>{
    const w=isWolf(bot), pers=bot.pers, cr=credOf(bot,ev.by);
    switch(ev.type){
      case 'CLAIM_SEER':{
        const others=G.seerClaims.filter(s=>s!==ev.by);
        if(w){bot.cred[ev.by]=isWolf(seatOf(ev.by))?0.15:0.85;break;}
        if(others.length===0){bot.cred[ev.by]=0.55+pers.trust*0.2;}
        if(G.day>=2&&G.players.some(q=>q.seat!==ev.by&&!q.alive&&q.claim==='預言家'&&q.deathCause==='knife')){
          bot.cred[ev.by]=Math.min(bot.cred[ev.by]??0.5,0.32);
          adjSusp(bot,ev.by,0.28);
        }
        else{ // 對跳：先信一邊，之後靠資訊修正
          const lean=Math.random()<0.5?ev.by:others[0];
          bot.cred[ev.by]=lean===ev.by?0.6:0.35;
          others.forEach(o=>{bot.cred[o]=lean===o?0.6:0.35;});
          adjSusp(bot,lean===ev.by?others[0]:ev.by,0.15);
        }
        break;}
      case 'CLAIM_ROLE':{
        if(ev.role==='女巫'&&bot.role==='WITCH'&&bot.seat!==ev.by){
          bot.wantClaim=true;bot.fakeWitchSeat=ev.by;bot.susp[ev.by]=0.92;
        }
        if(!w)applyRoleClaimCredit(bot,ev);
        break;}
      case 'CHECK_WOLF':{
        if(w)break;
        adjSusp(bot,ev.target,0.45*cr);
        if(bot.seat===ev.target){adjSusp(bot,ev.by,0.5);bot.cred[ev.by]=0.05;addHate(bot,ev.by,0.80,`${ev.by}號查殺我`);addPressure(bot,ev.by,0.90,`${ev.by}號查殺我`);}
        if(bot.role==='WITCH'&&(ev.target===bot.seat||(bot.savedSeat&&ev.target===bot.savedSeat))){
          bot.cred[ev.by]=0.03;bot.susp[ev.by]=0.95;bot.wantClaim=true; // 銀水/自身被查殺→識破悍跳
        }
        break;}
      case 'CHECK_GOOD':{ if(!w)adjSusp(bot,ev.target,-0.3*cr); break;}
      case 'ACCUSE':{
        if(w)break;
        adjSusp(bot,ev.target,0.11*pers.conform*(1-(bot.susp[ev.by]??0.3)));
        if(bot.seat===ev.target){adjSusp(bot,ev.by,0.12*pers.paranoia);addHate(bot,ev.by,0.32,`${ev.by}號公開踩我`);addPressure(bot,ev.by,0.28,`${ev.by}號公開踩我`);}
        break;}
      case 'DEFEND':{ if(!w)adjSusp(bot,ev.target,-0.07*pers.conform); break;}
      case 'WITCH_INFO':{
        const wp=seatOf(ev.by);
        if(wp){
          wp.claim='女巫';
          if(ev.saved)wp.savedSeat=ev.saved;
          if(ev.poisoned)wp.poisonedSeat=ev.poisoned;
          const parts=[];
          if(ev.saved)parts.push(`${ev.saved}號銀水`);
          if(ev.poisoned)parts.push(`毒${ev.poisoned}號`);
          if(parts.length)wp.claimInfo=(wp.claimInfo?wp.claimInfo+'；':'')+parts.join('；');
        }
        if(w)break;
        if(claimantSeats('女巫').length<2)bot.cred[ev.by]=Math.max(credOf(bot,ev.by),0.80);
        if(ev.saved)adjSusp(bot,ev.saved,-0.35);
        if(ev.poisoned)adjSusp(bot,ev.poisoned,0.2);
        G.players.forEach(q=>{ // 查殺過女巫(或其銀水)的claimant信譽崩
          (q.claimChecks||[]).forEach(c=>{
            if(c.wolf&&(c.target===ev.by||(ev.saved&&c.target===ev.saved))){
              bot.cred[q.seat]=Math.min(credOf(bot,q.seat),0.2);adjSusp(bot,q.seat,0.3);
            }
          });
        });
        break;}
      case 'SEER_DIED_NIGHT':{ // 跳神者夜間倒牌 → 遺言可信度上升，對跳者洗黑
        if(w)break;
        bot.cred[ev.target]=Math.min(1,credOf(bot,ev.target)+0.3);
        G.seerClaims.filter(s=>s!==ev.target&&seatOf(s).alive)
          .forEach(o=>{adjSusp(bot,o,0.3);bot.cred[o]=Math.max(0,credOf(bot,o)-0.3);});
        break;}
      case 'DUEL_WOLF':{ bot.cred[ev.by]=1; bot.susp[ev.by]=0; adjSusp(bot,ev.by,-0.9); addMindNote(bot,ev.by,`${ev.by}號騎士撞狼成功，鐵好信用100`,0.08); break;}
      case 'DUEL_GOOD':{ adjSusp(bot,ev.target,-0.9); break;}
    }
  });
}
/* 公開翻牌（決鬥/獵人/狼王）→ 回頭驗證所有跳神者報過的查驗 */
function verifyReveal(seat,isWolfTrue){
  G.players.forEach(q=>{
    (q.claimChecks||[]).forEach(c=>{
      if(c.target!==seat)return;
      const correct=c.wolf===isWolfTrue;
      alive().filter(b=>!b.isHuman&&b.seat!==q.seat&&!isWolf(b)).forEach(bot=>{
        if(correct){bot.cred[q.seat]=Math.min(1,credOf(bot,q.seat)+0.35);adjSusp(bot,q.seat,-0.25);}
        else{bot.cred[q.seat]=0.05;adjSusp(bot,q.seat,0.55);}
      });
      if(!correct&&q.alive)sys(`（${q.seat}號報過${seat}號${c.wolf?'查殺':'金水'}——與翻牌結果矛盾！）`,'nightSys');
      else if(correct&&q.alive&&q.revealed==='wolf')sys(`（${q.seat}號狼預發言與翻牌同向，但不視為有效驗人。）`,'nightSys');
      else if(correct&&q.alive)sys(`（${q.seat}號對${seat}號的查驗獲得證實。）`,'nightSys');
    });
  });
}
function topSuspect(bot,exclude=[]){
  if(isWolf(bot))return wolfVoteTarget(bot); // 狼的「懷疑」是表演：投給威脅最大的好人
  if(!hasEnoughTalkForAccuse())return null; // 還沒發言完前不憑空說不舒服
  ensureMind(bot);
  const cand=alive().filter(p=>p.seat!==bot.seat&&!exclude.includes(p.seat)
    &&canDiscussSeatNow(p.seat)
    &&p.revealed!=='good'&&!isProtectedSoloSeer(bot,p)&&!isProtectedPublicInfoSeat(bot,p)&&credOf(bot,p.seat)<=0.72);
  if(!cand.length)return null;
  cand.sort((a,b)=>votePriorityScore(bot,b.seat)-votePriorityScore(bot,a.seat));
  const best=cand[0];
  const score=votePriorityScore(bot,best.seat);
  if(G.day===1&&isLowInfoOrCautiousSeat(best.seat)&&!hasHardSuspicionReason(bot,best.seat))return null;
  if(score<0.48&&!hasHardSuspicionReason(bot,best.seat))return null;
  addMindNote(bot,best.seat,`目前最高狼面候選：${Math.round(beliefWolfProb(bot,best.seat)*100)}%`,0.02);
  return best.seat;
}
/* 好人集體討論後的共識目標：好人bot平均懷疑最高者 */
function consensusTarget(observer=null){
  // 只統計「公開說出口的歸票意圖」，不能先用真陣營挑出好人陪審團。
  if(!hasEnoughTalkForAccuse())return null;
  const tally=new Map();
  const seen=new Set();
  const add=(by,target,base=1)=>{
    const bp=seatOf(by),tp=seatOf(target);
    if(!bp?.alive||!tp?.alive||by===target||!canDiscussSeatNow(target))return;
    const key=`${by}-${target}`;if(seen.has(key))return;seen.add(key);
    const trust=observer&&observer.seat!==by?clamp(0.35+credOf(observer,by)*0.65,0.25,1):1;
    tally.set(target,(tally.get(target)||0)+base*trust);
  };
  (G.speechBriefs||[]).filter(b=>b.day===G.day&&b.voteIntent).forEach(b=>add(b.seat,b.voteIntent,1));
  (G.aiJudgements||[]).filter(j=>j.day===G.day&&/VoteIntent/.test(j.type)&&j.target).forEach(j=>add(j.by,j.target,0.85));
  alive().filter(p=>p.llmVote).forEach(p=>add(p.seat,p.llmVote,0.75));
  const rows=[...tally.entries()].sort((a,b)=>b[1]-a[1]);
  if(!rows.length)return null;
  const [seat,score]=rows[0], second=rows[1]?.[1]||0;
  return score>=1.35&&score>=second+0.30?seat:null;
}

function chooseWolfTactic(bot,wolvesAlive){
  if(!bot||!isWolf(bot))return null;

    if(wolvesAlive.length<=1)return 'FRAME';
    const r=Math.random();
    if(r<0.42)return 'CUT';
    if(r<0.72)return 'HOOK';

  }
  const hasFake=wolvesAlive.some(w=>w.wolfTactic==='FAKE'||w.claim==='預言家');

  if(bot.pers.agg>0.55)return Math.random()<0.55?'HOOK':'DIVE';

}
function assignWolfTactics(){

function wolfKillTarget(){

    if(p.role==='SEER'||p.role==='SPIRIT')score+=3.5;

  const wolfTargets=()=>G.fairMode
    ? alive().filter(p=>p.seat!==bot.seat&&!isWolf(p)&&canDiscussSeatNow(p.seat))
    : goods().filter(p=>p.seat!==bot.seat&&canDiscussSeatNow(p.seat));
  const teamLead=wolves().filter(w=>w.seat!==bot.seat&&validVoteTargetFor(w,w.llmVote)&&!isWolf(seatOf(w.llmVote)));
  if(teamLead.length&&Math.random()<(wolfCrisisInfo(bot)?0.82:0.55))return teamLead[0].llmVote;
  const fakeBlack=wolves().filter(w=>w.claim==='預言家').flatMap(w=>(w.claimChecks||[]).filter(c=>c.wolf).map(c=>c.target)).find(t=>seatOf(t)?.alive&&!isWolf(seatOf(t))&&validVoteTargetFor(bot,t));
  if(fakeBlack&&Math.random()<(wolfCrisisInfo(bot)?0.68:0.42))return fakeBlack;
  if(G.ruleMode==='fun'&&!goods().length){
    const cand=alive().filter(p=>p.seat!==bot.seat);
    if(!cand.length)return null;
    cand.sort((a,b)=>(bot.susp[b.seat]??0.3)-(bot.susp[a.seat]??0.3));
    return cand[0].seat;
  }
  const publicSeerClaims=G.seerClaims.map(seatOf).filter(p=>p&&p.alive);
  const enemySeerClaims=publicSeerClaims.filter(p=>!isWolf(p));
  if(enemySeerClaims.length){
    if(enemySeerClaims.length>=2){
      const score=p=>{
        let s=0.5+Math.random()*0.2;
        alive().filter(b=>!b.isHuman&&!isWolf(b)).forEach(b=>s+=credOf(b,p.seat)*0.8-beliefWolfProb(b,p.seat)*0.2);
        return s;
      };
      return enemySeerClaims.sort((a,b)=>score(b)-score(a))[0].seat;
    }
    const target=enemySeerClaims[0];
    if(Math.random()<0.14+bot.pers.agg*0.10)return target.seat;
    const cover=wolfTargets().filter(p=>p.seat!==target.seat&&p.revealed!=='good');
    if(cover.length){
      const avg=p=>{let s=0,c=0;alive().filter(b=>!b.isHuman&&!isWolf(b)).forEach(b=>{s+=votePriorityScore(b,p.seat);c++;});return c?s/c:0.3;};
      return cover.sort((a,b)=>avg(b)-avg(a))[0].seat;
    }
    return null;
  }
  const cand=wolfTargets().filter(p=>p.revealed!=='good');
  if(!cand.length)return wolfTargets()[0]?.seat??null;
  const avg=p=>{let s=0,c=0;alive().filter(b=>!b.isHuman&&!isWolf(b)).forEach(b=>{s+=votePriorityScore(b,p.seat);c++;});return c?s/c:0.3;};
  const best=cand.sort((a,b)=>avg(b)-avg(a))[0];
  addMindNote(bot,best.seat,'狼隊白天推票目標：好人視角最容易被推',0.04);
  return best.seat;
}

/* ---------- 夜間各角色（bot） ---------- */
function seerCertainWolfFromOwnInfo(seer,p){
  if(!seer||!p||p.seat===seer.seat)return false;
  if(p.revealed==='wolf')return true;
  if(seer.checked&&seer.checked[p.seat]===true)return true;
  // 真預言家知道本局只有一張預言家；任何公開悍跳預言家的外置位，對他而言已是定狼，不浪費查驗。
  if(seer.role==='SEER'&&(p.claim==='預言家'||p.claim==='通靈師'||G.seerClaims.includes(p.seat)))return true;
  return false;
}
function seerCheckCandidates(seer){
  return alive().filter(p=>p.seat!==seer.seat
    &&!(p.seat in (seer.checked||{}))
    &&!(p.seat in (seer.trueChecks||{}))
    &&!seerCertainWolfFromOwnInfo(seer,p));
}
function botSeerCheck(seer){
  ensureMind(seer);
  const cand=seerCheckCandidates(seer);
  if(!cand.length)return null;
  const publicHeat=p=>{
    let s=0;
    if(p.claim==='通靈師')s+=0.20;
    if(p.claim==='女巫')s+=0.12;
    if(G.aiJudgements.some(j=>j.target===p.seat&&/Accuse|VoteIntent|deathAccuse|falseAccuse/.test(j.type)))s+=0.12;
    s+=Math.abs((beliefWolfProb(seer,p.seat))-0.5)*0.45; // 查高爭議或高狼面，但已定狼直接排除
    s+=voteTraceHeat(seer,p.seat);
    if(G.day===1&&!hasSpokenToday(p.seat)&&!hasPublicHardInfoSeat(p.seat))s-=0.25;
    return s+Math.random()*0.05;
  };
  cand.sort((a,b)=>publicHeat(b)-publicHeat(a));
  return cand[0].seat;
}
function seerInfoValueForWitch(seer){
  if(!seer)return 0;
  let score=0;
  const checks=[...(seer.claimChecks||[])];
  Object.entries(seer.checked||{}).forEach(([seat,w])=>checks.push({target:+seat,wolf:!!w,trueCheck:true}));
  checks.forEach(c=>{
    if(c.wolf){
      score+=0.42;
      const t=seatOf(c.target);
      // 只能使用公開翻牌驗證查殺；死亡但未翻牌、真實陣營都不可偷看。
      if(t&&t.revealed==='wolf')score+=0.28;
    }else score+=0.10;
  });
  if(G.players.some(p=>p.revealed==='wolf'&&p.claim==='預言家'&&p.seat!==seer.seat))score+=0.12;
  return Math.min(1.0,score);
}
function publicSeerCreditForWitch(witch,seer){
  if(!seer)return 0;
  let score=0;
  if(seer.claim==='預言家'||G.seerClaims.includes(seer.seat))score+=0.35;
  score+=Math.max(0,Math.min(1,credOf(witch,seer.seat)||0))*0.35;
  score+=seerInfoValueForWitch(seer)*0.45;
  if(seer.revealed==='good')score+=0.35;
  if(seer.revealed==='wolf')score-=1.2;
  if(knownFakeSeerClaims().some(f=>f.seat===seer.seat))score-=1.2;
  return Math.max(0,Math.min(1.2,score));
}
function hasStrongerSeerCounterForWitch(witch,seer){
  const mine=publicSeerCreditForWitch(witch,seer);
  return G.seerClaims.map(seatOf).some(p=>p&&p.alive&&p.seat!==seer.seat&&publicSeerCreditForWitch(witch,p)>mine+0.28);
}
function witchSavePriority(witch,killSeat){
  const kp=seatOf(killSeat); if(!witch||!kp)return -9;
  let s=0;
  if(killSeat===witch.seat)s+=G.day===1?1.05:0.18; // 首夜自救，後續是否能自救由UI/規則另控
  if(kp.claim==='預言家'||G.seerClaims.includes(kp.seat)){
    const credit=publicSeerCreditForWitch(witch,kp);
    const info=seerInfoValueForWitch(kp);
    s+=0.32+credit*0.72+info*0.85;
    if((kp.claimChecks||[]).some(c=>c.wolf))s+=0.28; // 查殺資訊比金水更值得救
    if(!hasStrongerSeerCounterForWitch(witch,kp))s+=0.16;
  }
  if(kp.claim==='通靈師')s+=0.72;
  if(kp.revealed==='good'||(kp.role==='KNIGHT'&&kp.revealed==='good'))s+=0.80;
  if(kp.claim==='女巫')s+=hasWitchCounterClaim()?0.05:0.40;
  if(kp.claim==='獵人')s+=claimantSeats('獵人').length>=2?0.05:0.22;
  s-=beliefWolfProb(witch,kp.seat)*0.35;
  return s;
}
function recordWitchNoSavePenalty(witch,killSeat){
  const kp=seatOf(killSeat); if(!witch||!kp||!G.witch.save)return 0;
  if(!(kp.claim==='預言家'||G.seerClaims.includes(kp.seat)))return 0;
  const credit=publicSeerCreditForWitch(witch,kp), info=seerInfoValueForWitch(kp);
  if(credit<0.48)return 0;
  let penalty=0.10+credit*0.25+info*0.45;
  if((kp.claimChecks||[]).some(c=>c.wolf))penalty+=0.28;
  if((kp.claimChecks||[]).some(c=>!c.wolf))penalty+=0.05;
  penalty=Math.min(1,penalty);
  witch.hiddenDecisionScore=(witch.hiddenDecisionScore||0)-Math.round(penalty*100);
  witch.noSavePenalty=(witch.noSavePenalty||0)+Math.round(penalty*100);
  addMindNote(witch,kp.seat,`未救高價值預言家${kp.seat}號，隱藏扣分${Math.round(penalty*100)}`,0.05);
  return penalty;
}
function botWitchDecide(witch,killSeat){
  ensureMind(witch);
  let save=false,poison=null;
  if(killSeat&&G.witch.save){
    const saveScore=witchSavePriority(witch,killSeat);
    save=saveScore>=0.60;
  }
  if(save)return{save,poison:null}; // 同一晚女巫只能救或毒，不能兩瓶同時丟。
  if(G.witch.poison&&G.day>=2){
    if(witch.fakeWitchSeat&&seatOf(witch.fakeWitchSeat)?.alive)poison=witch.fakeWitchSeat;
    else{
      const cand=alive().filter(p=>p.seat!==witch.seat&&!isProtectedPublicInfoSeat(witch,p)&&!isProtectedSoloSeer(witch,p));
      cand.sort((a,b)=>votePriorityScore(witch,b.seat)-votePriorityScore(witch,a.seat));
      const t=cand[0]?.seat;
      if(t&&beliefWolfProb(witch,t)>0.72&&hasHardSuspicionReason(witch,t))poison=t;
    }
  }
  return{save,poison};
}

function fillTpl(s,vars={}){return s.replace(/\{(\w+)\}/g,(_,k)=>vars[k]??'');}
function offlineSay(key,vars={}){const arr=AI_KNOWLEDGE.dialogue[key]||AI_KNOWLEDGE.dialogue.pass;return fillTpl(rnd(arr),vars);}
function safeGet(key, fallback=''){
  try{return localStorage.getItem(key) ?? fallback;}catch(e){return fallback;}
}
function safeSet(key, value){
  try{localStorage.setItem(key, value);}catch(e){}
}
function apiBaseFromEndpoint(url){
  let u=String(url||'').trim();
  if(!u)return '';
  u=u.replace(/\/+$/,'');
  u=u.replace(/\/v1\/chat\/completions$/i,'').replace(/\/v1$/i,'').replace(/\/api\/chat$/i,'').replace(/\/api\/tags$/i,'');
  return u;
}
function normalizeApiEndpoint(url,type=G.api.type||'llama'){
  const base=apiBaseFromEndpoint(url);
  if(!base)return '';
  if(type==='ollama')return base+'/api/chat';
  return base+'/v1/chat/completions';
}
function modelListEndpoint(url,type=G.api.type||'llama'){
  const base=apiBaseFromEndpoint(url);
  if(!base)return '';
  return type==='ollama'?base+'/api/tags':base+'/v1/models';
}
function writeApiToUrl(){
  try{
    const u=new URL(location.href);
    if(G.aiOn)u.searchParams.set('api','1');else u.searchParams.delete('api');
    if(G.api.type)u.searchParams.set('apiType',G.api.type);
    if(G.api.endpoint)u.searchParams.set('apiHost',apiBaseFromEndpoint(G.api.endpoint));else u.searchParams.delete('apiHost');
    if(G.api.model)u.searchParams.set('apiModel',G.api.model);else u.searchParams.delete('apiModel');
    history.replaceState(null,'',u.toString());
  }catch(e){}
}
function loadApiConfig(){
  try{
    const saved=JSON.parse(safeGet('moonVillageApi','{}')||'{}');
    const legacy=Object.assign(defaultApiSlot(),saved.api||saved||{});
    G.api=normalizeApiSlot(legacy);
    const rawSlots=Array.isArray(saved.slots)?saved.slots:(Array.isArray(saved.apiSlots)?saved.apiSlots:[]);
    const count=clamp(parseInt(saved.apiCount||rawSlots.filter(x=>x&&x.endpoint).length||1,10)||1,1,10);
    G.apiSlots=rawSlots.length?rawSlots.slice(0,10).map(normalizeApiSlot):makeApiSlots(count);
    while(G.apiSlots.length<10)G.apiSlots.push(blankApiSlot());
    if(!G.apiSlots[0].endpoint)G.apiSlots[0]=normalizeApiSlot(Object.assign(defaultApiSlot(),G.apiSlots[0]));
    if(!activeApiSlots().length&&G.api.endpoint)G.apiSlots[0]=normalizeApiSlot(G.api);
    if(saved.llmMode)G.llmMode=saved.llmMode;

async function fetchAvailableModels(type,endpoint){
  const url=modelListEndpoint(endpoint,type);
  if(!url)throw new Error('請先輸入 API 主機。');
  const r=await fetch(url,{method:'GET'});
  if(!r.ok)throw new Error('模型清單讀取失敗：HTTP '+r.status);
  const d=await r.json();
  if(type==='ollama')return (d.models||[]).map(m=>m.name||m.model).filter(Boolean);
  return (d.data||[]).map(m=>m.id).filter(Boolean);
}
function fillModelSelect(selectId,models,current){
  const sel=$(selectId);if(!sel)return;
  const cur=(current||sel.value||'').trim();
  const chosen=cur||(models[0]||'');
  sel.innerHTML='';
  const first=document.createElement('option');first.value='';first.textContent=models.length?'請選擇模型':'找不到模型';first.selected=!chosen;sel.appendChild(first);
  models.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(m===chosen)o.selected=true;sel.appendChild(o);});
  if(chosen&&!models.includes(chosen)){const o=document.createElement('option');o.value=chosen;o.textContent=chosen+'（手動）';o.selected=true;sel.appendChild(o);}
  if(chosen)sel.value=chosen;
}
async function checkModelsFromFields(prefix){
  const type=$(prefix+'ApiType')?.value||G.api.type||'llama';
  const endpoint=$(prefix+'ApiEndpoint')?.value||G.api.endpoint||DEFAULT_API_HOST;
  const status=$(prefix+'ApiStatus');
  if(status)status.textContent='正在檢查模型…';
  try{
    const models=await fetchAvailableModels(type,endpoint);
    const oldManual=$(prefix+'ApiModelManual')?.value?.trim()||'';
    fillModelSelect(prefix+'ApiModel',models,oldManual||$(prefix+'ApiModel')?.value||G.api.model);
    const picked=$(prefix+'ApiModel')?.value||models[0]||'';
    if($(prefix+'ApiModelManual')&&!$(prefix+'ApiModelManual').value.trim())$(prefix+'ApiModelManual').value=picked;
    if(status)status.textContent=models.length?`找到 ${models.length} 個模型，已選擇：${picked||'未選擇'}`:'沒有取得模型，請手動輸入。';
  }catch(e){
    if(status)status.textContent=(e?.message||String(e))+'；可手動輸入模型名稱，或確認 llama.cpp / LM Studio 是否已開。';
  }
}

async function llm(prompt,timeoutMs=API_TIMEOUT_MS,meta={}){
  if(!G.aiOn||!apiReady()||G.apiFailedThisGame)throw new Error('offline mode');
  const slot=pickApiSlot();
  const type=slot.type||'llama';
  const endpoint=normalizeApiEndpoint(slot.endpoint,type);
  const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),timeoutMs);
  const started=(typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();
  apiLogStatus(`🤖 API生成中：${apiCallWho(meta)}｜${slot.model}｜timeout ${Math.round(timeoutMs/1000)}秒`);
  try{
    const headers={'Content-Type':'application/json'};if(slot.key)headers.Authorization='Bearer '+slot.key;
    const temp=G.llmMode==='free'?0.72:0.58;
    // v0.6.37：本地4B模型容易長篇或洩漏JSON，改用低溫短輸出，投票由規則腦校正。
    const predict=G.llmMode==='free'?96:80;
    const maxTok=G.llmMode==='free'?120:96;
    const systemPrompt='你是一名正常狼人殺玩家。只用自己座號、身份視角與公開資訊發言；禁止上帝視角、禁止洩漏真身分表、禁止承認自己是狼人或說自己狼面，除非已被公開驗狼。不要輸出思考過程、旁白、markdown、vote欄位或JSON殘留。發言最多2句，每句30字內。/no_think';
    const body=type==='ollama'
      ? {model:slot.model,stream:false,options:{temperature:temp,num_predict:predict},messages:[{role:'system',content:systemPrompt},{role:'user',content:prompt}]}
      : {model:slot.model,max_tokens:maxTok,temperature:temp,messages:[{role:'system',content:systemPrompt},{role:'user',content:prompt}]};
    const r=await fetch(endpoint,{method:'POST',headers,signal:ctrl.signal,body:JSON.stringify(body)});
    if(!r.ok)throw new Error('API '+r.status);
    const d=await r.json();
    const text=(d.choices?.[0]?.message?.content)||(d.message?.content)||(d.response)||(d.content||[]).map?.(c=>c.text||'').join('')||d.text||'';
    const ended=(typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();
    apiLogStatus(`✅ API成功：${apiCallWho(meta)}｜${slot.model}｜${((ended-started)/1000).toFixed(1)}秒`);
    return text;
  }catch(e){
    G.apiFailedThisGame=true;
    if(!G.apiNoticeShown){
      apiLogStatus('🤖 AI：API暫時不可用，本局已自動切換離線模板。');
      G.apiNoticeShown=true;
    }
    throw e;
  }finally{clearTimeout(to);}
}

function extractJsonObject(text){
  const raw=String(text||'').trim().replace(/```json|```/g,'').trim();
  try{return JSON.parse(raw);}catch(e){}
  const a=raw.indexOf('{'), b=raw.lastIndexOf('}');
  if(a>=0&&b>a){try{return JSON.parse(raw.slice(a,b+1));}catch(e){}}
  return null;
}
function validVoteTargetFor(bot,seat){
  const n=+seat; const p=seatOf(n);
  return !!(p&&p.alive&&p.seat!==bot.seat&&!bot.noVote);
}
function extractVoteFromSpeech(text,bot){
  const s=String(text||'');
  const strong=[...s.matchAll(/(?:我(?:會|要)?|今天|今晚|這票|票型|歸票|先)?\s*(?:投|票|出|放逐|歸)\s*(\d{1,2})\s*號?/g)].map(m=>+m[1]);
  for(const n of strong){if(validVoteTargetFor(bot,n))return n;}
  return null;
}
function cleanLlmVisibleText(text,bot=null,fallback=''){
  let raw=String(text||'').trim().replace(/```json|```/gi,'').trim();
  const obj=typeof extractJsonObject==='function'?extractJsonObject(raw):null;
  if(obj&&typeof obj.speech==='string')raw=obj.speech;
  raw=raw.replace(/vote\s*[:：]\s*\{[^{}]*\}/gi,' ')
         .replace(/\{\s*"?vote"?\s*[:：][^{}]*\}/gi,' ')
         .replace(/"?(speech|vote|suspects|trusted|reason|confidence)"?\s*[:：]\s*/gi,' ')
         .replace(/[{}\[\]"]/g,' ')
         .replace(/\/no_think/gi,' ')
         .replace(/\s+/g,' ').trim();
  if(bot){
    const selfRe=new RegExp(`(?:我|${bot.seat}號)(?:真是|是|很像|有點|偏|超)?(?:狼人|狼王|狼面|狼坑|可疑|該出|該票)`);
    if(selfRe.test(raw)&&!(bot.revealed==='wolf'))return fallback||'';
    if(/我真是狼人|我是狼人|我承認我是狼|為保隊友|狼隊友/.test(raw)&&!(bot.revealed==='wolf'))return fallback||'';
    if((bot.role!=='SEER'&&bot.role!=='SPIRIT')&&/(我驗了|昨晚驗|查了\d|\d+號金水|\d+號查殺)/.test(raw)){
      // 非預言家/通靈師不允許亂報真查驗；回落到規則模板。
      return fallback||'';
    }
  }
  return raw;
}

發言者：${G.human.seat}號。發言：「${text.replace(/"/g,'')}」`, Math.min(API_TIMEOUT_MS,45000), {kind:'玩家發言解析'});
    const clean=raw.replace(/```json|```/g,'').trim();
    const j=JSON.parse(clean);
    {const merged={...empty,...j,claim:j.claim||offline.claim,checks:[...(j.checks||[]),...(offline.checks||[])],accuse:[...(j.accuse||[]),...(offline.accuse||[])],trust:[...(j.trust||[]),...(offline.trust||[])],observe:[...(j.observe||[]),...(offline.observe||[])],witch:{...empty.witch,...(j.witch||{}),saved:(j.witch?.saved||offline.witch.saved||null),poisoned:(j.witch?.poisoned||offline.witch.poisoned||null)},vote:j.vote||offline.vote||null,asksClaim:[...(j.asksClaim||[]),...(offline.asksClaim||[])],behaviorTags:{...(offline.behaviorTags||{}),...(j.behaviorTags||{})},shifts:[...(offline.shifts||[]),...(j.shifts||[])]};return sanitizeParsedSpeech(merged,text);}

function applyParsedHuman(parsed){
  const s=G.human.seat, notes=[];
  if(parsed.claim){
    G.human.claim=parsed.claim;notes.push('跳'+parsed.claim);
    if(parsed.claim==='預言家'){
      if(!G.seerClaims.includes(s))G.seerClaims.push(s);
      applyEvent({type:'CLAIM_SEER',by:s});
    }else applyEvent({type:'CLAIM_ROLE',by:s,role:parsed.claim});
  }
  (parsed.checks||[]).forEach(c=>{
    if(!c||!c.target||c.target===s)return;
    const wolfCheck=c.result==='狼';
    G.human.claimInfo=(G.human.claimInfo?G.human.claimInfo+'；':'')+`${c.target}號${wolfCheck?'查殺':'金水'}`;
    (G.human.claimChecks=G.human.claimChecks||[]).push({target:c.target,wolf:wolfCheck});
    notes.push(`報${c.target}號${wolfCheck?'查殺':'金水'}`);
    applyEvent({type:wolfCheck?'CHECK_WOLF':'CHECK_GOOD',by:s,target:c.target});
  });
  if(parsed.witch&&(parsed.witch.saved||parsed.witch.poisoned)){
    if(parsed.witch.saved)G.human.savedSeat=parsed.witch.saved;
    if(parsed.witch.poisoned)G.human.poisonedSeat=parsed.witch.poisoned;
    applyEvent({type:'WITCH_INFO',by:s,saved:parsed.witch.saved,poisoned:parsed.witch.poisoned});
    notes.push('報用藥資訊');
  }
  const acc=[]; (parsed.accuse||[]).forEach(t=>{if(t!==s){acc.push(t);applyEvent({type:'ACCUSE',by:s,target:t});}});
  const tr=[]; (parsed.trust||[]).forEach(t=>{if(t!==s){tr.push(t);applyEvent({type:'DEFEND',by:s,target:t});}});
  if(acc.length)notes.push(`點名/狼坑${[...new Set(acc)].join('、')}號`);
  if(tr.length)notes.push(`信任/暫放${[...new Set(tr)].join('、')}號`);
  const obs=uniqNums(parsed.observe||[]).filter(t=>t!==s&&!acc.includes(t)&&!tr.includes(t));
  if(obs.length)notes.push(`觀察/保留${obs.join('、')}號`);
  const tagLabel={hook:'倒鉤',charge:'衝鋒',lurk:'潛水/划水',cut:'切割',defend:'保人',push:'帶票',scapegoat:'抗推'};
  Object.entries(parsed.behaviorTags||{}).forEach(([k,nums])=>{const arr=uniqNums(nums).filter(t=>t!==s); if(arr.length)notes.push(`${tagLabel[k]||k}${arr.join('、')}號`);});
  const sh=(parsed.shifts||[]).filter(x=>x&&x.target!==s).slice(0,3);
  sh.forEach(x=>notes.push(`${x.target}號心路${x.from||''}→${x.to||''}`));
  if(parsed.vote)notes.push(`投票意圖${parsed.vote}號`);
  if(parsed.asksClaim?.length)notes.push(`要求${[...new Set(parsed.asksClaim)].join('、')}號拍身分`);
  refreshSeats();
  return notes;
}

/* ---------- 白天發言意圖（規則引擎決策，LLM只負責措辭） ---------- */
function decideIntent(bot){
  const events=[];let desc='',fb='';
  const claimSeerLine=(target,wolfCheck)=>{
    if(!G.seerClaims.includes(bot.seat))G.seerClaims.push(bot.seat);
    bot.claim='預言家';
    bot.claimInfo=(bot.claimInfo?bot.claimInfo+'；':'')+`${target}號${wolfCheck?'查殺':'金水'}`;
    (bot.claimChecks=bot.claimChecks||[]).push({target,wolf:wolfCheck});
    events.push({type:'CLAIM_SEER',by:bot.seat});
    events.push({type:wolfCheck?'CHECK_WOLF':'CHECK_GOOD',by:bot.seat,target});
  };
  const claimSpiritLine=(target,roleKey)=>{
    bot.claim='通靈師';
    const roleName=ROLES[roleKey]?.name||roleKey;
    bot.claimInfo=(bot.claimInfo?bot.claimInfo+'；':'')+`${target}號真實身分是${roleName}`;
    events.push({type:'CLAIM_ROLE',by:bot.seat,role:'通靈師'});
    events.push({type:ROLES[roleKey]?.team==='wolf'?'CHECK_WOLF':'CHECK_GOOD',by:bot.seat,target});
  };
  if(bot.role==='SEER'){
    const last=bot.lastCheck;
    if(last){
      claimSeerLine(last.target,last.wolf);
      desc=`你是真預言家，公開跳身分並報最新驗人：${last.target}號是${last.wolf?'狼人（查殺）':'好人（金水）'}${G.seerClaims.filter(x=>x!==bot.seat).length?'，並痛斥對跳的假預言家':''}。`;
      fb=seerClaimFallbackLine(bot,last.target,last.wolf);
    }
  }else if(bot.role==='SPIRIT'){
    const last=bot.lastTrueCheck;
    if(last){
      claimSpiritLine(last.target,last.role);
      desc=`你是真通靈師，公開跳身分並報最新查驗：${last.target}號真實身分是${ROLES[last.role]?.name||last.role}。`;
      fb=`我是通靈師，昨晚查了${last.target}號，他的真實身分是${ROLES[last.role]?.name||last.role}。`;
    }
  }else if(isWolf(bot)&&(bot.wolfTactic==='FAKE'||G.counterClaimPlan===bot.seat||bot.claim==='預言家')){
    // v0.6.11：悍跳要像真人。不是看到對跳就機械查殺；可以發金水、軟對跳、先盤鏈。
    const checked=fakeSeerCheckedSeats(bot);
    const style=ensureFakeSeerStyle(bot);
    const enemySeerClaim=G.seerClaims.map(seatOf).find(p=>p&&p.alive&&!isWolf(p)&&!checked.has(p.seat));
    let t=null, wolfCheck=false;
    if(enemySeerClaim&&style===FAKE_SEER_STYLES.BLACK_SEER){
      t=enemySeerClaim.seat; wolfCheck=true;
      desc=`你公開宣稱自己是預言家。今天報${t}號查殺，必須使用和預言家相同的驗人播報口徑：驗人、警徽流、驗人理由、對跳態度都要完整。`;
    }else if(G.day>=1&&spokenCount()>=1){
      t=pickFakeSeerCheck(bot);
      if(t){
        wolfCheck=fakeSeerResultFor(bot,t);
        const styleName={GOLD_MATE:'隊友金水',GOLD_GOOD:'外置金水',SOFT_COUNTER:'軟對跳',BLACK_WEAK:'弱位查殺',BLACK_SEER:'硬查殺對跳'}[style]||'假預';
        desc=`你公開宣稱自己是預言家。今天報${t}號${wolfCheck?'查殺':'金水'}，必須使用和預言家相同的驗人播報口徑：交代驗人理由、警徽流、對跳態度；不要露出悍跳口吻。`;
      }
    }
    if(t){
      claimSeerLine(t,wolfCheck);
      fb=fakeSeerFallbackLine(bot,t,wolfCheck);
    }
  }else if(bot.role==='WITCH'&&bot.wantClaim){
    bot.claim='女巫';events.push({type:'WITCH_INFO',by:bot.seat,saved:bot.savedSeat,poisoned:null});
    if(bot.fakeWitchSeat&&seatOf(bot.fakeWitchSeat)?.alive){
      desc=`你是真女巫，${bot.fakeWitchSeat}號對跳女巫。公開身分，說明女巫能用毒藥證清白；但不要說已經毒，除非夜裡真的用毒。`;
      fb=offlineSay('witchCounter',{t:bot.fakeWitchSeat});
    }else{
      desc=`你是女巫，公開身分${bot.savedSeat?('並報'+bot.savedSeat+'號是你昨夜救的銀水'):''}，幫好人整理資訊。`;
      fb=offlineSay('witch',{saved:bot.savedSeat||'某'});
    }
    bot.wantClaim=false;
  }
  if(!fb){
    const forced=forcedPersonalResponse(bot);
    if(forced){
      desc=forced.desc;
      fb=forced.fb;
      events.push({type:'ACCUSE',by:bot.seat,target:forced.target});
    }
  }
  if(!fb){
    if(isWolf(bot)&&bot.wolfTactic==='DIVE'){
      desc='你是狼人，昨夜暗號是「潛水」。白天少說話、不主動帶票、不亂站邊，只做保守觀望。';
      fb=offlineSay('wolfDive');
    }else if(isWolf(bot)&&bot.wolfTactic==='HOOK'){
      const ht=wolfHookTarget(bot);
      if(ht&&hasEnoughTalkForAccuse()){
        desc=`你是狼人，昨夜暗號是「倒鉤」。可以輕踩隊友${ht}號做身分，但只能輕度懷疑，不要打死。`;
        fb=offlineSay('wolfHook',{t:ht});
      }
    }else if(isWolf(bot)&&bot.wolfTactic==='CUT'){
      const c=wolfCrisisInfo(bot); const ht=wolfHookTarget(bot);
      if(c&&hasEnoughTalkForAccuse()){
        const t=ht||c.recent.seat;
        desc=`你是狼人，隊友${c.recent.seat}號已暴露或出局。這輪要公開切割狼隊線，表現成不認${t}號/不認已死狼視角的好人，但不能露出隊友視角。`;
        fb=offlineSay('wolfHook',{t});
      }
    }else if(isWolf(bot)&&bot.wolfTactic==='FRAME'){
      const t=topSuspect(bot);
      if(t&&hasEnoughTalkForAccuse()){
        desc=`你是狼人，狼隊已進入殘局危機。這輪要把焦點轉到${t}號，理由要包裝成票型收益、站邊混亂或預言家鏈斷點，不要像硬推。`;
        fb=offlineSay('suspectMid',{t});
      }
    }
  }
  if(!fb){
    if(!isWolf(bot)&&seerChainActive()&&G.day>=2&&Math.random()<Math.min(0.92,0.42+trainingBias('noSeerChain',0.16))){
      const info=seerChainAdvice();
      const hard=seerChainObligationTarget(bot)||bestSeerChainTarget(bot);
      if(hard){
        events.push({type:'ACCUSE',by:bot.seat,target:hard});
        const judge=judgementForTarget(bot,hard);
        desc=`場上有已證假預或預言家鏈，必須把查殺/金水按來源回推。公開資訊：${info} 本輪核心目標是${hard}號，理由：${judge.reason}。不要再跳去打低資訊外置位。`;
        fb=`${info} 這輪我優先歸${hard}號，因為這是翻牌和查驗鏈推出來的，不是低資訊亂打。`;
      }else{
        desc='場上有預言家對跳、預言家死亡或金水/查殺鏈。優先提醒大家盤預言家鏈與金水，不要直接打低資訊外置位。公開資訊：'+info;
        fb=offlineSay('seerChain',{info});
      }
    }else if(!hasEnoughTalkForAccuse()){
      desc='首輪前幾麥資訊不足，不要憑空指控任何人；先說會記發言、看跳身分和票型。';
      fb=offlineSay('observe');
    }else{
      const t=topSuspect(bot);
      if(t){
        const judge=judgementForTarget(bot,t);
        const mindLine=strategicIntentLine(bot,t);
        const strong=judge.kind==='suspect'&&(judge.level==='mid'||judge.level==='high');
        if(strong)events.push({type:'ACCUSE',by:bot.seat,target:t});
        if(isWolf(bot))desc=`你是隱藏的狼人，偽裝成普通村民。你目前想把焦點輕輕引向${t}號。判讀等級：${judge.level}，理由：${judge.reason}。高玩判讀：${mindLine} 只能根據公開資訊，不要捏造「帶票、跟風、矛盾」等未發生行為。`;
        else desc=`你是好人，先判讀再發言。目標：${t}號；判讀等級：${judge.level}；理由：${judge.reason}。高玩判讀：${mindLine} 禁止捏造未發生的發言行為；若只是輕度懷疑，就明說只是觀察。`;
        fb=offlineSay(judge.key,{t});
      }else{

        if(trust){const judge=judgementForTarget(bot,trust);desc=`你目前沒有明確狼坑，改為表達對${trust}號的${judge.level}信任，理由：${judge.reason}。`;fb=offlineSay(judge.key,{t:trust});}
        else{desc='場上資訊少，簡短過渡發言。';fb=offlineSay('pass');}
      }
    }
  }
  return{events,desc,fb};
}

/* ---------- 死亡處理（含技能鏈） ---------- */
function hunterGunTarget(p){
  const cand=alive().filter(q=>q.seat!==p.seat);
  if(!cand.length)return null;
  if(isHunterGunMode()){
    // 全獵人局沒有白天資訊，獵人不能直接從真狼人名單選目標；只能盲射並靠連鎖自然停在狼人。
    return rnd(cand).seat;
  }
  if(!p.isHuman)ensureMind(p);
  const safe=cand.filter(q=>!isProtectedPublicInfoSeat(p,q)&&!isProtectedSoloSeer(p,q)&&q.revealed!=='good');
  if(safe.length){
    safe.sort((a,b)=>votePriorityScore(p,b.seat)-votePriorityScore(p,a.seat));
    if(votePriorityScore(p,safe[0].seat)>0.52||hasHardSuspicionReason(p,safe[0].seat))return safe[0].seat;
  }
  return topSuspect(p)||rnd(cand).seat;
}

function revealHumanDeathVision(p){
  if(!p||!p.isHuman||p.deathVisionShown||G.over||p.alive)return;
  p.deathSkillResolving=false;
  p.deathVisionShown=true;
  refreshSeats();
  sys('👁️ 你已進入死亡視角，資訊欄與座位標籤會顯示全場真實身分。','nightSys');
}
async function killPlayer(seat,cause){ // cause: knife | poison | vote | gun | claw | duel | explode | blast
  const p=seatOf(seat);if(!p||!p.alive)return;
  p.alive=false;p.deathCause=cause;p.deathDay=G.day;
  // v0.6.2：獵人/狼王是臨死技能。玩家開槍/帶人前不可先進死亡視角偷看全場身分。
  if(p.isHuman){p.deathSkillResolving=true;}
  refreshSeats();
  // v0.6.33：勝負鎖定優先。若這次死亡已經造成當前板子的勝負結算，
  // 就直接結束遊戲，不再開啟獵人/狼王補槍窗口。死亡技能只存在於「勝負尚未成立」的結算窗口。
  const forcedHunterChain=isHunterGunMode()&&p.role==='HUNTER'&&cause!=='blast'&&alive().length>0;
  if(!G.deferWinCheck&&!forcedHunterChain&&checkWin()){
    if(p.isHuman)p.deathSkillResolving=false;
    return;
  }
  const canSkill=cause!=='poison'&&cause!=='blast';
  const canHunterShoot=(p.role==='HUNTER'&&(forcedHunterChain||(canSkill&&(cause!=='duel'||isHunterGunMode()))));
  const canWolfKingClaw=(p.role==='WOLF_KING'&&canSkill);
  if(!canHunterShoot&&!canWolfKingClaw){revealHumanDeathVision(p);return;}
  if(G.over){if(p.isHuman)p.deathSkillResolving=false;return;}
  if(canHunterShoot){
    // v0.6.15：獵人槍與狼王槍在公開紀事中不直接區分；除非已被騎士等公開驗明，否則不翻真身分。
    const alreadyRevealed=publicRevealKnown(p);
    refreshSeats();
    sys(alreadyRevealed?`${p.seat}號已被公開驗好，臨死舉槍——`:`${p.seat}號臨死舉槍，槍口緩緩抬起——`,'important');
    if(alreadyRevealed)verifyReveal(p.seat,false);
    let t;
    if(p.isHuman)t=await pickModal({title:'💥 臨死開槍',sub:isHunterGunMode()?'全獵人局不可收槍：若射中獵人，該獵人繼續開槍；直到有人射中狼人為止。':'你臨死前可帶走一名玩家；此時尚未進入死亡視角，只能依公開資訊判斷。公開紀事不會直接說這是獵人槍還是狼王槍。',candidates:alive().filter(q=>q.seat!==p.seat),skipText:isHunterGunMode()?null:'不開槍'});
    else{t=hunterGunTarget(p);}
    if(isHunterGunMode()&&!t){const forced=alive().filter(q=>q.seat!==p.seat);t=forced.length?rnd(forced).seat:null;}
    if(G.over){if(p.isHuman)p.deathSkillResolving=false;return;}
    if(t){p.hunterShotSeat=t;renderInfoPanel();sys(`💥 ${p.seat}號臨死開槍帶走了 ${t}號 ${seatOf(t).name}！`,'important');await sleep(900);await killPlayer(t,'gun');}
    else sys(`${p.seat}號收起了槍。`);
  }
  if(!G.over&&canWolfKingClaw){
    // v0.6.15：狼王出局不再自動公開「狼王」字樣；槍聲與獵人槍相同，讓遺言與站邊更有博弈空間。
    const alreadyRevealed=publicRevealKnown(p); // 例如已被騎士決鬥驗狼，才算公開狼。
    refreshSeats();
    sys(alreadyRevealed?`${p.seat}號已被公開驗狼，臨死舉槍——`:`${p.seat}號臨死舉槍，槍口緩緩抬起——`,'important');
    if(alreadyRevealed){verifyReveal(p.seat,true);resolveFakeSeerReveal(p.seat);}
    let t;
    if(p.isHuman)t=await pickModal({title:'💥 臨死開槍',sub:'你臨死前可帶走一名玩家；此時尚未進入死亡視角，只能依公開資訊與狼視角判斷。公開紀事不會直接說這是獵人槍還是狼王槍。',candidates:alive().filter(q=>q.seat!==p.seat),skipText:'不開槍'});
    else{const g=goods().filter(q=>q.claim==='預言家'||q.claim==='女巫');t=g.length?g[0].seat:(goods()[0]?.seat??null);}
    if(G.over){if(p.isHuman)p.deathSkillResolving=false;return;}
    if(t){p.wolfKingClawSeat=t;renderInfoPanel();sys(`💥 ${p.seat}號臨死開槍帶走了 ${t}號 ${seatOf(t).name}！`,'important');await sleep(900);await killPlayer(t,'claw');}
  }
  if(!G.over&&!G.deferWinCheck)checkWin();
  if(G.over&&p.isHuman)p.deathSkillResolving=false;
  revealHumanDeathVision(p);
}
function checkWin(){
  if(G.over)return true;
  const w=wolves().length;
  const g=goods().length;

  // v0.7.2：所有6人局採屠城規則。
  // 狼人全滅＝好人勝；仍有狼人且存活狼人數 >= 存活好人數＝狼人勝。
  // 神職全滅或平民全滅都不會單獨觸發狼人勝利。
  if(G.playerCount===6){
    if(w===0){endGame('good');return true;}
    if(w>0&&w>=g){endGame('wolf');return true;}
    return false;
  }

  if(G.ruleMode==='fun'){
    const living=alive();
    if(living.length===0){endGame('none');return true;}
    if(living.length===1){endGame('survivor',living[0]);return true;}
    return false;
  }
  if(w===0){endGame('good');return true;}
  const aliveGods=goods().filter(p=>p.role!=='VILLAGER').length;
  const aliveVillagers=goods().filter(p=>p.role==='VILLAGER').length;
  if((G.initialGodCount>0&&aliveGods===0)||(G.initialVillagerCount>0&&aliveVillagers===0)){
    endGame('wolf');return true;
  }
  return false;
}
function endGame(winner,survivor=null){
  G.over=true;speakGlow(null);
  const title=winner==='good'?'好人勝利':winner==='wolf'?'狼人勝利':winner==='survivor'?'最後生還者':'全員滅亡';
  const icon=winner==='good'?'🌅':winner==='wolf'?'🌘':winner==='survivor'?'🏆':'💀';
  const sub=winner==='good'?'月蝕散去，村莊迎來黎明':winner==='wolf'?(G.playerCount===6?'狼人數量已追平或超過好人，村莊全面失守':'狼人完成屠邊，村莊沉入永夜'):winner==='survivor'?`${survivor.seat}號 ${survivor.name} 活到了最後`:'村莊沒有任何人生還';
  setPhase(title,winner!=='wolf',icon,sub);

  sys(msg,'important');

}

/* ---------- 守衛 ---------- */
function guardTargetFor(guard){
  const cand=alive().filter(p=>p.seat!==guard.lastGuardTarget);
  if(!cand.length)return null;
  const priority=cand.filter(p=>p.claim==='預言家'||p.claim==='女巫'||p.claim==='騎士'||p.revealed==='good');
  if(priority.length)return rnd(priority).seat;
  if(!guard.isHuman){ensureMind(guard);cand.sort((a,b)=>(credOf(guard,b.seat)-beliefWolfProb(guard,b.seat))-(credOf(guard,a.seat)-beliefWolfProb(guard,a.seat)));}
  return cand[0]?.seat||rnd(cand).seat;
}

    }
    nightSys('通靈儀式中浮現出真實身分……');await sleep(1000);
  }

  /* 守衛行動 */
  let guarded=null;
  const guard=alive().find(p=>p.role==='GUARD');
  if(guard){
    const candidates=alive().filter(p=>p.seat!==guard.lastGuardTarget);
    if(guard.isHuman){

    if(guarded){guard.lastGuardTarget=guarded;guard.guardHistory=guard.guardHistory||[];guard.guardHistory.push({day:G.day,target:guarded});renderInfoPanel();}

      }else if(G.witch.save){await infoModal('🧪 女巫請睜眼','今晚是平安夜，無人倒牌。');}
      if(G.witch.poison&&!saved){
        const t=await pickModal({title:'☠️ 是否使用毒藥？',sub:'同一晚只能救人或毒人；毒殺的玩家無法發動技能。',
          candidates:alive().filter(p=>p.seat!==witch.seat),skipText:'不使用毒藥'});
        if(t){poisoned=t;G.witch.poison=false;witch.poisonedSeat=t;renderInfoPanel();}
      }else if(saved&&G.witch.poison){
        nightSys('女巫本夜已使用解藥，不能同夜再用毒藥。');
      }
    }else{
      const d=botWitchDecide(witch,kill);
      if(d.save&&kill){saved=true;G.witch.save=false;witch.savedSeat=kill;
        if(Math.random()<0.6)witch.wantClaim=true;}
      else if(kill&&G.witch.save){recordWitchNoSavePenalty(witch,kill);}
      if(!saved&&d.poison){poisoned=d.poison;G.witch.poison=false;witch.poisonedSeat=d.poison;}
    }
    nightSys('藥草的氣味在夜風中飄散……');await sleep(1000);
  }

  /* 結算 */
  const deaths=[];
  const guardedWolfVictim=!!(kill&&guarded===kill);
  if(kill){
    if(guardedWolfVictim&&saved){deaths.push({seat:kill,cause:'knife'});nightSys('守護與解藥同時落在同一人身上，力量互相衝突。');}
    else if(!guardedWolfVictim&&!saved)deaths.push({seat:kill,cause:'knife'});
  }
  if(poisoned&&!deaths.find(d=>d.seat===poisoned))deaths.push({seat:poisoned,cause:'poison'});
  await dawn(deaths);
}

/* ---------- 天亮 ---------- */
function deathCausePublicLine(d,p){
  if(!p)return '';
  if(d.cause==='knife')return `💀 狼人襲擊，${p.seat}號 ${p.name} 倒在了廣場上。`;
  if(d.cause==='poison')return `🧪 女巫毒藥生效，${p.seat}號 ${p.name} 倒在了月影之下。`;
  if(d.cause==='gun')return `💥 槍聲過後，${p.seat}號 ${p.name} 倒在了廣場上。`;
  if(d.cause==='claw')return `💥 臨死槍帶走了 ${p.seat}號 ${p.name}。`;
  if(d.cause==='duel')return `⚔️ 騎士決鬥後，${p.seat}號 ${p.name} 出局。`;
  return `💀 昨夜，${p.seat}號 ${p.name} 倒在了廣場上。`;
}
async function dawn(deaths){
  if(G.over)return;
  setPhase(`第 ${G.day} 天`,true,'☀️','天亮請睜眼');
  sys(`— 第 ${G.day} 天，晨光穿透霧氣 —`,'important');
  await sleep(900);
  if(!deaths.length){sys('🕊️ 昨晚是平安夜，無人出局。');}
  else{
    for(const d of deaths){
      const p=seatOf(d.seat);
      sys(deathCausePublicLine(d,p),'important');
      // 首夜死者有遺言（此時 alive 尚未翻false，決策引擎照常運作）
      if(G.day===1){
        if(p.isHuman){
          const text=await humanInput('你倒在了首夜。留下遺言（可留空）：');
          if(text){say(p,text,true);recordDeathNote(p.seat,text);const parsed=await parseHumanSpeech(text);applyParsedHuman(parsed);}
        }else{
          speakGlow(p.seat);hint(`${p.seat}號 ${p.name} 留下遺言 <span class="thinking">思考中</span>`);
          const {events,desc,fb}=decideIntent(p);
          events.forEach(applyEvent);refreshSeats();
          const t=await genLastWords(p,fb);say(p,t);speakGlow(null);
        }
      }
      if(p.claim==='預言家')applyEvent({type:'SEER_DIED_NIGHT',target:p.seat});
      await killPlayer(d.seat,d.cause);
      if(G.over)return;
      await sleep(700);
    }
  }
  if(isHunterGunMode()){
    if(!G.over)sys('🏹 全獵人局：死亡即開槍，沒有白天盤邏輯，村莊直接進入下一夜。','important');
    return G.over?null:nightPhase();
  }
  G.speechStart=deaths.length?((deaths[0].seat)%G.playerCount)+1:((G.day)%G.playerCount)+1;
  await dayTalk();
}

/* ---------- 白天發言 ---------- */
function deadNightSeerBlackTargets(){
  // 公開資訊：夜死且跳預言家/通靈師的人報出的查殺，騎士可以拿來當硬鏈，不使用真身分。
  const out=[];
  G.players.forEach(q=>{
    if(q.alive)return;
    if(!(q.claim==='預言家'||q.claim==='通靈師'||G.seerClaims.includes(q.seat)))return;
    if(q.deathCause!=='knife'&&G.day<2)return;
    (q.claimChecks||[]).forEach(c=>{
      const t=seatOf(c.target);
      if(c.wolf&&t&&t.alive&&t.revealed!=='good')out.push({by:q.seat,target:t.seat,reason:`${q.seat}號夜死預言家查殺${t.seat}號`});
    });
  });
  return out;
}
function knightDuelPublicScore(bot,targetSeat){
  const p=seatOf(targetSeat); if(!p||!p.alive||p.seat===bot.seat)return -99;
  if(p.revealed==='good')return -99;
  let score=0;
  // 全部只吃公開鏈、claim、發言統計、票型追責；公平模式不可直接看 p.role。
  score+=(bot.susp?.[p.seat]??0.3)*1.0;
  score+=voteTraceHeat(bot,p.seat)*0.9;
  score+=seerChainWolfModifier(bot,p.seat)*1.6;
  if(hasHardSuspicionReason(bot,p.seat))score+=0.55;
  if(p.claim==='預言家'||p.claim==='通靈師'){
    score+=0.25;
    score+=(0.62-credOf(bot,p.seat))*1.55;
    if(G.players.some(q=>!q.alive&&(q.claim==='預言家'||q.claim==='通靈師'||G.seerClaims.includes(q.seat))))score+=0.42;
  }
  deadNightSeerBlackTargets().forEach(x=>{if(x.target===p.seat)score+=2.45;});
  if(G.aiJudgements.some(j=>j.target===p.seat&&(j.type==='deathAccuse'||j.type==='falseAccuse'||j.type==='seerChainConfirmed')))score+=0.35;
  if(isLowInfoOrCautiousSeat(p.seat)&&!hasHardSuspicionReason(bot,p.seat))score-=0.55;
  if(isProtectedPublicInfoSeat(bot,p)||isProtectedSoloSeer(bot,p))score-=1.8;
  return score;
}
function chooseKnightDuelTarget(bot){
  if(!bot||bot.role!=='KNIGHT'||bot.knightUsed||!bot.alive)return null;
  ensureMind(bot);
  const canTarget=seat=>{
    const p=seatOf(seat);
    return !!(p&&p.alive&&p.seat!==bot.seat&&p.revealed!=='good'&&canDiscussSeatNow(p.seat));
  };
  // 1) 夜死預言家/通靈師查殺鏈：可以第1天就劈，不再等第2天。
  const deadHits=deadNightSeerBlackTargets().filter(x=>canTarget(x.target));
  if(deadHits.length){
    deadHits.sort((a,b)=>knightDuelPublicScore(bot,b.target)-knightDuelPublicScore(bot,a.target));
    const best=deadHits[0];
    if(knightDuelPublicScore(bot,best.target)>=1.55){
      addMindNote(bot,best.target,`騎士決鬥窗口：${best.reason}`,0.35);
      return best.target;
    }
  }
  // 2) 對跳/多預言家鏈：只在騎士自己的發言回合結束時判斷。
  const claimants=G.seerClaims.map(seatOf).filter(q=>q&&q.alive&&q.seat!==bot.seat&&canTarget(q.seat));
  const hasDeadSeer=G.players.some(q=>!q.alive&&(q.claim==='預言家'||q.claim==='通靈師'||G.seerClaims.includes(q.seat)));
  if(claimants.length>=2||(claimants.length>=1&&hasDeadSeer&&G.day>=2)){
    claimants.sort((a,b)=>knightDuelPublicScore(bot,b.seat)-knightDuelPublicScore(bot,a.seat));
    const best=claimants[0];
    const sc=knightDuelPublicScore(bot,best.seat);
    if(sc>=1.15){
      addMindNote(bot,best.seat,'騎士決鬥窗口：預言家鏈/對跳僵局需要破局',0.25);
      return best.seat;
    }
  }
  // 3) 普通高狼面：第2天後才允許，避免首日無資訊亂劈。
  if(G.day>=2){
    const t=topSuspect(bot);
    if(t&&canTarget(t)&&knightDuelPublicScore(bot,t)>=1.35&&hasHardSuspicionReason(bot,t)&&!isLowInfoOrCautiousSeat(t)){
      addMindNote(bot,t,'騎士決鬥窗口：高確信狼坑',0.25);
      return t;
    }
  }
  return null;
}
async function dayTalk(){
  if(G.over)return;
  G.spokenToday=[];
  decayDailyRelations();
  G.players.forEach(p=>p.llmVote=null);
  sys('🗣️ 進入發言階段。');
  const order=[];
  for(let i=0;i<G.playerCount;i++){const s=((G.speechStart-1+i)%G.playerCount)+1;if(seatOf(s)?.alive)order.push(s);}
  for(const s of order){
    if(G.over)return;
    const p=seatOf(s);if(!p.alive)continue;
    G.currentSpeakerSeat=p.seat;
    speakGlow(s);
    if(p.isHuman){
      const text=await humanSpeechTurn();
      if(text){
        say(p,text,true);
        hint('<span class="thinking">村民們在咀嚼你的發言</span>');
        const parsed=await parseHumanSpeech(text);
        const notes=applyParsedHuman(parsed);
        recordSpeechUnderstanding(p,text,{parsed});
        if(notes.length)sys(`🧭 AI理解官：已讀取你的發言＝${notes.join('、')}`,'nightSys');
      }else {say(p,'（過麥）',true);recordSpeechUnderstanding(p,'（過麥）');}
      G.spokenToday.push(p.seat);G.speechLog.push({day:G.day,seat:p.seat,text:text||'（過麥）'});recordSpeech(p,text||'（過麥）');
      // 騎士只能在自己的發言回合中發動：發言結束後、下一位玩家開始前，給最後一次決鬥窗口。
      if(p.role==='KNIGHT'&&!p.knightUsed&&p.alive){
        const duelT=await humanKnightDuelWindow(p);
        if(duelT){await doDuel(p.seat,duelT);if(G.dayEnded){G.currentSpeakerSeat=null;G.dayEnded=false;return nightPhase();}}
      }
      if(p.role==='WHITE_WOLF_KING'&&!p.whiteWolfUsed&&p.alive){
        const blastT=await humanWhiteWolfWindow(p);
        if(blastT){await doWhiteWolfExplosion(p.seat,blastT);G.currentSpeakerSeat=null;G.dayEnded=false;if(!G.over)return nightPhase();return;}
      }
    }else{
      hint(`${p.seat}號 ${p.name} 發言 <span class="thinking">思考中</span>`);
      const {events,desc,fb}=decideIntent(p);
      // 半自由：規則腦先落地事件；自由發揮：LLM先說，事後由解析器寫入公開claim/check。
      if(G.llmMode!=='free')events.forEach(applyEvent);
      refreshSeats();
      await sleep(aiPause(.75));
      let text,semi=null;
      p.llmVote=null;
      const useLLM=speechNeedsLLM(p,events,desc,fb);
      if(useLLM){
        try{
          semi=G.llmMode==='free'?await genFreeAction(p,desc,fb):await genSemiFreeAction(p,desc,fb);
          text=semi.speech;
          if(validVoteTargetFor(p,semi.vote)){p.llmVote=semi.vote;p.llmVoteReason=semi.reason||'';}
          (semi.suspects||[]).forEach(t=>applyEvent({type:'ACCUSE',by:p.seat,target:t}));
          (semi.trusted||[]).forEach(t=>applyEvent({type:'DEFEND',by:p.seat,target:t}));
          if(semi.vote)G.aiJudgements.push({day:G.day,type:G.llmMode==='free'?'llmFreeVoteIntent':'llmVoteIntent',by:p.seat,target:semi.vote,reason:semi.reason||''});
        }catch(e){
          if(G.llmMode==='free')events.forEach(applyEvent);
          // v0.6.24：API 只處理關鍵局勢；失敗不重打，普通發言直接走模板。
          text=polishAiSpeech(fb,p,160);
        }
      }else{
        text=polishAiSpeech(fb,p,160);
      }
      text=polishAiSpeech(text,p,180);
      say(p,text);
      recordSpeechUnderstanding(p,text,{semi});
      G.spokenToday.push(p.seat);G.speechLog.push({day:G.day,seat:p.seat,text});recordSpeech(p,text);
      await sleep(aiPause(.45));
      // AI騎士也只在自己的發言結束後判斷，不再於全員發言完或投票前突然出劍。
      if(p.role==='KNIGHT'&&!p.knightUsed&&p.alive){
        const duelT=chooseKnightDuelTarget(p);

function chooseWhiteWolfTarget(p){
  const cand=alive().filter(q=>q.seat!==p.seat&&!isWolf(q));
  if(!cand.length)return null;
  cand.sort((a,b)=>{
    const val=q=>(q.claim==='預言家'?4:q.claim==='女巫'?3.7:q.claim==='守衛'?3.2:q.claim==='騎士'?3:q.revealed==='good'?2.6:0)+(q.publicCredit||0)/50;
    return val(b)-val(a);
  });
  const best=cand[0];
  const urgent=G.day>=2||wolves().length<=2||alive().length<=6||best.claim==='預言家'||best.claim==='女巫';
  return urgent&&Math.random()<(0.38+(p.pers?.agg||.4)*.35)?best.seat:null;
}

/* ---------- 投票 ---------- */
async function votePhase(){
  if(G.over)return;
  sys('🗳️ 進入投票階段。');
  const tally={},detail=[],ballots=[],voteMap={};
  // 公開歸票共識必須針對每名玩家的可見資訊計算，不能由真好人名單組成陪審團。
  const cons=null;
  for(const p of alive()){
    let t=null;
    if(p.noVote){detail.push(`${p.seat}→無票權`);voteMap[p.seat]='NO';continue;}
    if(p.isHuman){
      t=await humanVoteInline();
    }else if(isWolf(p)){
      // 狼人在自由模式可以自由倒鉤、賣隊友或藏票；但明確「切割/自爆準備」信號要優先於 LLM 隨機票。
      const tactical=wolfVoteTarget(p);
      if(validVoteTargetFor(p,tactical))t=tactical;
      else if(validVoteTargetFor(p,p.llmVote)&&!(G.llmMode!=='free'&&isProtectedPublicInfoSeat(p,seatOf(p.llmVote))))t=p.llmVote;
      else t=topSuspect(p);
    }else{ // 好人：真預遺產/硬鏈優先；自由發揮也不能蓋過已被公開資訊證強的預言家鏈。
      const obligation=seerChainObligationTarget(p);
      const finalTarget=finalDayVoteTarget(p);
      const legacy=(trueSeerLegacyTargets(p)||[])[0]?.seat||null;
      const hardChain=bestSeerChainTarget(p);
      const own=topSuspect(p);
      const isSafeVote=x=>x&&x!==p.seat&&!isProtectedSoloSeer(p,seatOf(x))&&!isProtectedPublicInfoSeat(p,seatOf(x))&&!(G.day===1&&isLowInfoOrCautiousSeat(x)&&!hasHardSuspicionReason(p,x))&&(hasHardSuspicionReason(p,x)||G.day>1||judgementForTarget(p,x).level!=='low'||seerChainWolfModifier(p,x)>0.45)&&!(seerChainActive()&&G.day>=2&&judgementForTarget(p,x).level==='low'&&!hasHardSuspicionReason(p,x)&&seerChainWolfModifier(p,x)<=0.45);
      const isFreeSafeVote=x=>x&&x!==p.seat&&!isProtectedSoloSeer(p,seatOf(x))&&!isProtectedPublicInfoSeat(p,seatOf(x));
      const perceivedCons=consensusTarget(p);
      const safeCons=isSafeVote(perceivedCons)?perceivedCons:null;
      const safeOwn=isSafeVote(own)?own:null;
      if(obligation&&isFreeSafeVote(obligation))t=obligation;
      else if(finalTarget&&isFreeSafeVote(finalTarget))t=finalTarget;
      else if(legacy&&isSafeVote(legacy))t=legacy;
      else if(hardChain&&isSafeVote(hardChain))t=hardChain;
      else if(G.llmMode==='free'&&validVoteTargetFor(p,p.llmVote)&&isFreeSafeVote(p.llmVote))t=p.llmVote;
      else if(validVoteTargetFor(p,p.llmVote)&&isSafeVote(p.llmVote)&&votePriorityScore(p,p.llmVote)>=(safeOwn?votePriorityScore(p,safeOwn)-0.12:0.48))t=p.llmVote;
      else if(!hasEnoughTalkForAccuse())t=null;
      else t=(safeCons&&Math.random()<0.18+p.pers.conform*0.25)?safeCons:safeOwn;
    }
    if(t){tally[t]=(tally[t]||0)+1;detail.push(`${p.seat}→${t}`);ballots.push({v:p.seat,t});voteMap[p.seat]=t;}
    else{detail.push(`${p.seat}→棄`);voteMap[p.seat]=null;}
  }
  log(`<b>票型</b>｜${detail.join('　')}`,'voteTable');
  const reasonLines=ballots.map(({v,t})=>explainVoteChoice(seatOf(v),t));
  if(reasonLines.length)log(`<b>歸票理由</b>｜${reasonLines.join('　')}`,'voteTable');
  G.voteHistory.push({day:G.day,ballots:[...ballots],tally:{...tally}});
  if(G.voteHistory.length>12)G.voteHistory=G.voteHistory.slice(-12);
  ballots.forEach(({v,t})=>alive().filter(b=>!b.isHuman&&b.seat!==v).forEach(b=>addMindNote(b,v,`${v}號本日投${t}號`,0.02)));
  ballots.forEach(({v,t})=>{
    const target=seatOf(t);
    if(target&&!target.isHuman&&target.alive&&target.seat!==v){
      addHate(target,v,0.24,`${v}號投我`);
      addPressure(target,v,0.22,`${v}號投我`);
    }
  });
  /* 票型追責：每名AI只按自己的信用判斷，不先用真陣營挑出「好人陪審團」。 */
  ballots.forEach(({v,t})=>{
    const tp=seatOf(t);if(!tp)return;
    alive().filter(b=>!b.isHuman&&b.seat!==v).forEach(b=>{
      if(tp.revealed==='good'||credOf(b,t)>0.60)adjSusp(b,v,0.16*(b.pers?.paranoia||0.4)+0.06);
    });
  });
  const max=Math.max(0,...Object.values(tally));
  const top=Object.keys(tally).filter(k=>tally[k]===max).map(Number);
  setLastVotePanel(G.day,voteMap,(max>0&&top.length===1)?top[0]:null,max);
  if(max===0||top.length>1){
    if(G.ruleMode==='fun'&&max===0&&alive().every(p=>p.noVote)){sys('所有存活者都沒有投票權，娛樂局無人生還。','important');return endGame('none');}
    sys('平票，今日無人被放逐。');return nightPhase();
  }
  const out=seatOf(top[0]);
  // 全局放逐保護只能依公開資訊，不可挑一名真好人充當隱藏裁判。
  const sampleJudge=alive().find(p=>!p.isHuman)||out;
  if(isProtectedPublicInfoSeat(sampleJudge,out)){
    sys(`${out.seat}號是公開報藥女巫/硬資訊位，沒有對跳或硬矛盾，村莊暫時壓下這輪暴民票。`);
    return nightPhase();
  }
  if(G.day===1&&isLowInfoOrCautiousSeat(out.seat)&&!hasHardSuspicionReason(sampleJudge,out.seat)){
    sys(`${out.seat}號只是低資訊或保留式站邊，村莊暫時壓下首日暴民票。`);
    return nightPhase();
  }
  if(out.claim==='預言家'&&singleAliveSeerClaimSeat()===out.seat&&!seerClaimIsContested(out.seat)&&max<=wolves().length+1){
    sys(`唯一預言家 ${out.seat}號 票數不足以定罪，村莊暫時壓下暴民票。`);
    return nightPhase();
  }
  if(out.role==='IDIOT'&&!out.idiotRevealed){
    out.claim='白癡';out.revealed='good';out.idiotRevealed=true;out.noVote=true;refreshSeats();
    sys(`🤪 ${out.seat}號 ${out.name} 翻牌——白癡！本次放逐免死，之後失去投票權。`,'important');
    verifyReveal(out.seat,false);
    return nightPhase();
  }
  sys(`⛓️ ${out.seat}號 ${out.name} 被村民放逐（${max}票）。`,'important');
  // 遺言
  if(out.isHuman){
    const text=await humanInput('你被放逐了。留下遺言：');
    if(text){say(out,text,true);markFakeDeathClaim(out,text);recordDeathNote(out.seat,text);const parsed=await parseHumanSpeech(text);applyParsedHuman(parsed);}
  }else{
    speakGlow(out.seat);hint(`${out.seat}號留下遺言 <span class="thinking">思考中</span>`);
    out.deathCause='vote';
    const t=await genLastWords(out,roleAwareLastWords(out));
    say(out,t);markFakeDeathClaim(out,t);speakGlow(null);
  }
  await killPlayer(out.seat,'vote');
  if(!G.over)await nightPhase();
}

async function beginGame(){
  G.players=[];G.seerClaims=[];G.counterClaimPlan=null;G.currentSpeakerSeat=null;G.day=0;G.over=false;G.deferWinCheck=false;G.witch={save:true,poison:true};G.spokenToday=[];G.speechLog=[];G.speechBriefs=[];G.voteHistory=[];G.lastVotePanel=null;G.aiJudgements=[];G.wolfTacticHistory=[];G.aiCheatAudits=[];G.antiCheatScore=0;G.dayEnded=false;G.initialGodCount=0;G.initialVillagerCount=0;G.apiNoticeShown=false;G.apiFailedThisGame=false;
  const deck=makeDeck().sort(()=>Math.random()-0.5);
  if(deck.length!==G.playerCount)throw new Error(`牌堆不是${G.playerCount}張，請回到板子設定調整。`);
  const forcedRole=(G.forcedHumanRole&&G.forcedHumanRole!=='RANDOM')?G.forcedHumanRole:null;
  let humanRole=null;
  if(forcedRole){
    const idx=deck.indexOf(forcedRole);
    if(idx<0)throw new Error(`玩家指定身份「${ROLES[forcedRole]?.name||forcedRole}」不在牌堆中。`);

  }
  const humanSeat=1+Math.floor(Math.random()*G.playerCount);
  let bi=0,di=0;
  for(let s=1;s<=G.playerCount;s++){
    const isHuman=s===humanSeat;
    const role=isHuman?(humanRole||deck[di++]):deck[di++];
    const p={seat:s,isHuman,alive:true,role,claim:null,claimInfo:null,revealed:null,
      knightUsed:false,whiteWolfUsed:false,whiteWolfTarget:null,lastGuardTarget:null,guardHistory:[],checked:{},trueChecks:{},lastCheck:null,lastTrueCheck:null,deathCause:null,wantClaim:false,savedSeat:null,poisonedSeat:null,
      hunterShotSeat:null,knightDuelSeat:null,knightDuelResult:null,wolfKingClawSeat:null,wolfKillHistory:[],wolfTactic:null,cheatScore:0,idiotRevealed:false,noVote:false,
      name:isHuman?'你':BOT_NAMES[bi%BOT_NAMES.length],avatar:PLAYER_AVATARS[(s-1)%PLAYER_AVATARS.length]||(isHuman?'🌙':BOT_AVATARS[bi%BOT_AVATARS.length]),
      pers:{style:isHuman?'':STYLES[bi%STYLES.length],paranoia:0.3+Math.random()*0.6,conform:0.2+Math.random()*0.6,trust:0.2+Math.random()*0.6,agg:0.2+Math.random()*0.7}};
    if(!isHuman)bi++;
    G.players.push(p);
  }
  G.human=seatOf(humanSeat);
  G.initialGodCount=G.players.filter(p=>ROLES[p.role].team==='good'&&p.role!=='VILLAGER').length;
  G.initialVillagerCount=G.players.filter(p=>p.role==='VILLAGER').length;
  G.players.filter(p=>!p.isHuman).forEach(initMind);
  const wolfBots=G.players.filter(p=>isWolf(p)&&!p.isHuman);
  if(wolfBots.length&&Math.random()<0.8){
    G.counterClaimPlan=wolfBots.sort((a,b)=>b.pers.agg-a.pers.agg)[0].seat;
  }
  buildSeats();
  renderInfoPanel();
  const r=ROLES[G.human.role];
  const mates=isWolf(G.human)?`<br><br>你的狼隊友：${G.players.filter(q=>isWolf(q)&&q.seat!==G.human.seat).map(q=>q.seat+'號 '+q.name).join('、')}`:'';
  await infoModal('你的身分',
    `<div class="roleBig">${r.icon}</div><div class="roleName ${r.team==='wolf'?'wolfSide':''}">${r.name}</div>
     你是 ${G.human.seat}號。<br>${r.desc}${mates}<br><br>
     板子：${boardSummary()}<br>人數：${G.playerCount}人<br>模式：${G.playerCount===6?'六人屠城局（狼全滅＝好人勝；存活狼數≥存活好人數＝狼人勝）':(G.specialRule==='allHunterChain'?'全獵人連鎖槍規則':(G.ruleMode==='fun'?'娛樂模式（最後生還者／全滅結算）':'標準模式（屠邊：狼全滅＝好人勝；神全死或民全死＝狼勝）'))}`,

  sys(`座次總表：${seatRosterText()}`,'nightSys');
  sys(`本局板子確認：${escapeHtml(boardSummary())}`,'nightSys');
  sys(`AI模式：${G.fairMode?'嚴格公平模式（私有視角隔離，禁止真身分裁判代選）':'導演模式（AI可用少量真身分輔助）'}`,'nightSys');
  hint('第一夜開始，請依照畫面提示行動。');
  await nightPhase();
}
window.addEventListener('error',e=>showFatalError(e));
window.addEventListener('unhandledrejection',e=>showFatalError(e.reason||e));
window.addEventListener('load',()=>{setTimeout(()=>{try{setup();}catch(err){showFatalError(err);}},300);});
</script>
