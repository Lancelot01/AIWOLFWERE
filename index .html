<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月蝕之村 Notte di Luna — AI狼人殺 v0.7.2 六人屠城版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --night-deep:#0d1120; --night-mid:#171d33; --panel:#1a2036; --panel-edge:#2a3352;
  --ink:#e6dfcd; --ink-dim:#9aa3bd; --blood:#b03a46; --blood-deep:#7c2531;
  --moon:#cfd9ea; --candle:#d9a04c; --good:#7fae8b; --wolf:#c96a5a;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Noto Sans TC',sans-serif; color:var(--ink);
  background:radial-gradient(ellipse 120% 90% at 50% -10%, #232b4d 0%, var(--night-mid) 40%, var(--night-deep) 100%);
  transition:background 1.6s ease; overflow:hidden;
}
body.daytime{
  background:radial-gradient(ellipse 120% 90% at 50% -10%, #4a4668 0%, #302f4a 45%, #1c1c30 100%);
}
#app{display:flex;flex-direction:column;height:100vh;max-width:1400px;margin:0 auto;padding:10px 14px}
header{display:flex;align-items:baseline;gap:14px;padding:4px 6px 10px;flex:0 0 auto}
header h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:22px;letter-spacing:3px}
header h1 em{font-style:normal;color:var(--blood)}
#phaseBadge{font-family:'Noto Serif TC',serif;font-size:14px;letter-spacing:2px;color:var(--candle);
  border:1px solid var(--panel-edge);padding:3px 12px;border-radius:20px;background:rgba(0,0,0,.25)}
#aiToggleWrap{margin-left:auto;font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:6px;user-select:none}
#aiToggleWrap input{accent-color:var(--blood)}
#aiToggleWrap .miniBtn{font-size:12px;padding:4px 8px;border-radius:8px;border:1px solid var(--panel-edge);background:rgba(26,32,54,.8);color:var(--ink-dim);cursor:pointer}
#aiToggleWrap .miniBtn:hover{color:var(--ink);border-color:var(--candle)}
#aiToggleWrap .speedWrap{display:flex;align-items:center;gap:5px}
#aiToggleWrap input[type="range"]{width:92px}
#aiToggleWrap select{border-radius:8px;border:1px solid var(--panel-edge);background:rgba(26,32,54,.8);color:var(--ink);font-size:12px;padding:3px 6px}
#aiToggleWrap select:disabled{opacity:.55}
main{flex:1 1 auto;display:flex;gap:14px;min-height:0}
/* ---- table ---- */
#tableWrap{flex:1 1 62%;position:relative;min-width:0}
#eclipse{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:150px;height:150px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;text-align:center;
  background:radial-gradient(circle at 38% 34%, #3c4668 0%, #10152a 70%);
  box-shadow:0 0 60px 12px rgba(176,58,70,.28), inset -14px -10px 40px rgba(0,0,0,.7);
  border:1px solid rgba(207,217,234,.18);transition:box-shadow 1.4s ease, background 1.4s ease}
body.daytime #eclipse{background:radial-gradient(circle at 40% 35%, #efe3bd 0%, #b89b5e 75%);
  box-shadow:0 0 70px 18px rgba(217,160,76,.30), inset -10px -8px 30px rgba(90,60,20,.45)}
#eclipse .ph-icon{font-size:34px;filter:drop-shadow(0 0 8px rgba(0,0,0,.6))}
#eclipse .ph-day{font-family:'Noto Serif TC',serif;font-size:15px;letter-spacing:2px;font-weight:700}
#eclipse .ph-txt{font-size:11px;color:var(--ink-dim);max-width:120px}
body.daytime #eclipse .ph-txt{color:#4a3c22}
body.daytime #eclipse .ph-day{color:#2e2410}
/* seats */
.seat{position:absolute;width:104px;transform:translate(-50%,-50%);text-align:center;transition:opacity .6s}
.seat .avatar{width:56px;height:56px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;
  font-size:26px;background:linear-gradient(160deg,#2b3450,#171d33);overflow:visible;
  border:2px solid var(--panel-edge);box-shadow:0 4px 14px rgba(0,0,0,.5);position:relative;transition:border-color .4s, box-shadow .4s}
.seat .avatar img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%}
.seat.speaking .avatar{border-color:var(--candle);box-shadow:0 0 18px rgba(217,160,76,.55)}
.seat.human .avatar{border-color:var(--moon)}
.seat.wolfVision .avatar{border-color:#e05260;box-shadow:0 0 22px rgba(224,82,96,.75),0 0 0 3px rgba(224,82,96,.22)}
.seat.seerGoodVision .avatar{border-color:#7fae8b;box-shadow:0 0 20px rgba(127,174,139,.62),0 0 0 3px rgba(127,174,139,.18)}
.seat.seerWolfVision .avatar{border-color:#e05260;box-shadow:0 0 22px rgba(224,82,96,.78),0 0 0 3px rgba(224,82,96,.24)}
.seat.witchSilverVision .avatar{border-color:#8ec8ff;box-shadow:0 0 20px rgba(142,200,255,.70),0 0 0 3px rgba(142,200,255,.18)}
.seat.witchPoisonVision .avatar{border-color:#b969d6;box-shadow:0 0 20px rgba(185,105,214,.70),0 0 0 3px rgba(185,105,214,.18)}
.seat .num{position:absolute;top:-9px;left:-9px;width:26px;height:26px;border-radius:50%;
  background:#11182d;color:#fff;font-size:13px;font-weight:900;
  display:flex;align-items:center;justify-content:center;border:2px solid rgba(230,223,205,.85);box-shadow:0 0 10px rgba(0,0,0,.75),0 0 8px rgba(217,160,76,.6)}
.seat .nm{font-size:13px;font-weight:500;letter-spacing:1px}
.seat .nm b{color:var(--candle);font-weight:900;margin-right:3px}
.seat .tags{min-height:16px;display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-top:2px}
.seat .voteHint{position:absolute;left:64px;top:12px;min-width:52px;max-width:78px;padding:2px 6px;border-radius:9px;border:1px solid rgba(217,160,76,.38);background:rgba(9,12,24,.78);color:var(--candle);font-size:10px;line-height:1.2;letter-spacing:.5px;text-align:left;box-shadow:0 2px 10px rgba(0,0,0,.45);display:none;pointer-events:none;white-space:nowrap}
.seat .voteHint.show{display:block}
.seat .voteHint.voteAbstain{color:var(--ink-dim);border-color:rgba(154,163,189,.32)}
.seat .tag{font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(217,160,76,.16);color:var(--candle);border:1px solid rgba(217,160,76,.35)}
.seat .tag.wolfTag{background:rgba(201,106,90,.18);color:var(--wolf);border-color:rgba(201,106,90,.4)}
.seat .tag.goodTag{background:rgba(127,174,139,.16);color:var(--good);border-color:rgba(127,174,139,.4)}
.seat.dead{opacity:.42}
.seat.dead .avatar{filter:grayscale(1);border-color:#3a3a44}
.seat.dead .avatar::after{content:'✝';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:30px;color:var(--blood);background:rgba(10,10,16,.55);border-radius:50%}
/* ---- log ---- */
#logPanel{flex:1 1 38%;max-width:460px;display:flex;flex-direction:column;min-height:0;
  background:linear-gradient(180deg,rgba(26,32,54,.85),rgba(19,24,42,.9));
  border:1px solid var(--panel-edge);border-radius:var(--radius);overflow:hidden}
#logPanel .lp-head{font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:3px;color:var(--ink-dim);
  padding:8px 14px;border-bottom:1px solid var(--panel-edge);display:flex;align-items:center;justify-content:space-between;gap:8px}
.logCopyBtn{font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;padding:3px 8px;border-radius:8px;border:1px solid var(--panel-edge);background:rgba(9,12,24,.55);color:var(--ink-dim)}
.logCopyBtn:hover{border-color:var(--candle);color:var(--ink)}
#log{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin}
#infoBox{flex:0 0 auto;border-top:1px solid var(--panel-edge);background:rgba(9,12,24,.32)}
#infoBox .lp-head{border-bottom:1px solid var(--panel-edge);padding:6px 14px}
#infoList{padding:8px 12px;display:grid;gap:5px;max-height:168px;overflow-y:auto;scrollbar-width:thin}
.infoRow{font-size:12.5px;line-height:1.45;color:var(--ink-dim);display:flex;gap:6px;align-items:flex-start}
.infoRow b{color:var(--candle);font-weight:700;min-width:58px;display:inline-block}
.infoRow .danger{color:var(--wolf)}
.infoRow .safe{color:var(--good)}
.msg{font-size:13.5px;line-height:1.55;padding:7px 11px;border-radius:10px;background:rgba(42,51,82,.35);
  border-left:3px solid var(--panel-edge);animation:fadeUp .35s ease}
.msg b{color:var(--candle);font-weight:700}
.msg.humanMsg{border-left-color:var(--moon)}
.msg.humanMsg b{color:var(--moon)}
.sys{font-size:12.5px;color:var(--ink-dim);text-align:center;padding:3px 6px;animation:fadeUp .35s ease}
.sys.important{color:var(--blood);font-family:'Noto Serif TC',serif;letter-spacing:2px;font-size:14px;padding:6px}
.sys.nightSys{color:#8b93c9}
.voteTable{font-size:12px;color:var(--ink-dim);background:rgba(0,0,0,.25);border-radius:8px;padding:6px 10px;animation:fadeUp .35s}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* ---- controls ---- */
footer{flex:0 0 auto;padding:10px 4px 4px}
#controls{min-height:64px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  background:linear-gradient(180deg,rgba(26,32,54,.8),rgba(15,19,36,.9));
  border:1px solid var(--panel-edge);border-radius:var(--radius);padding:10px 14px}
#controls .hint{font-size:13px;color:var(--ink-dim);letter-spacing:1px}
#controls textarea{flex:1 1 520px;min-width:420px;height:52px;resize:none;border-radius:10px;
  border:1px solid var(--panel-edge);background:rgba(9,12,24,.8);color:var(--ink);
  font-family:'Noto Sans TC',sans-serif;font-size:14px;padding:8px 10px;line-height:1.4}
#controls textarea:focus{outline:2px solid rgba(217,160,76,.5)}
.btn{font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;letter-spacing:1px;cursor:pointer;
  padding:9px 18px;border-radius:10px;border:1px solid var(--panel-edge);
  background:linear-gradient(160deg,#2b3450,#1b2138);color:var(--ink);transition:.15s}
.btn:hover{border-color:var(--candle);transform:translateY(-1px)}
.btn:focus-visible{outline:2px solid var(--candle)}
.btn.primary{background:linear-gradient(160deg,var(--blood),var(--blood-deep));border-color:rgba(230,223,205,.25)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.4;cursor:default;transform:none}
/* ---- modal ---- */
#overlay{position:fixed;inset:0;background:rgba(6,8,16,.12);backdrop-filter:none;
  display:none;align-items:center;justify-content:center;z-index:50}
/* v0.4.6：夜間/技能選擇不再模糊背景，方便玩家邊看聊天紀事邊分析 */
#overlay.show{display:flex}
#modal{width:min(560px,92vw);max-height:84vh;overflow-y:auto;background:linear-gradient(170deg,#20284a,#141a30);
  border:1px solid var(--panel-edge);border-radius:16px;padding:26px 28px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);animation:fadeUp .3s ease}
#modal h2{font-family:'Noto Serif TC',serif;font-size:22px;letter-spacing:4px;margin-bottom:6px}
#modal .sub{font-size:13px;color:var(--ink-dim);margin-bottom:16px;line-height:1.6}
#modal .roleBig{font-size:52px;margin:8px 0}
#modal .roleName{font-family:'Noto Serif TC',serif;font-size:30px;font-weight:900;letter-spacing:6px;color:var(--candle);margin-bottom:8px}
#modal .roleName.wolfSide{color:var(--wolf)}
.targetGrid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.targetGrid .btn{min-width:112px}
.thinking{display:inline-block;font-size:12px;color:var(--ink-dim);letter-spacing:2px}
.thinking::after{content:'…';animation:dots 1.2s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

.apiForm{display:grid;gap:8px;text-align:left;margin:12px 0}
.apiForm label{font-size:12px;color:var(--ink-dim);display:grid;gap:4px}
.apiForm input,.apiForm select{border-radius:8px;border:1px solid var(--panel-edge);background:rgba(9,12,24,.85);color:var(--ink);padding:8px;font-family:'Noto Sans TC',sans-serif}
.apiTools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.apiStatus{font-size:12px;color:var(--ink-dim)}
.apiSlotBox{border:1px solid var(--panel-edge);border-radius:10px;padding:9px;background:rgba(0,0,0,.16);display:grid;gap:6px}
.apiSlotBox h3{font-size:13px;color:var(--candle);font-family:'Noto Serif TC',serif;letter-spacing:2px;margin:0}
.apiSlotGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
@media (max-width:900px){.apiSlotGrid{grid-template-columns:1fr}}
.kbBox{text-align:left;max-height:54vh;overflow:auto;border:1px solid var(--panel-edge);border-radius:10px;padding:12px;background:rgba(0,0,0,.18);font-size:13px;line-height:1.65}
.kbBox h3{font-family:'Noto Serif TC',serif;color:var(--candle);margin:8px 0 4px;font-size:15px}
.kbBox ul{padding-left:20px;margin-bottom:8px;color:var(--ink-dim)}

.roleBuilder{display:grid;gap:10px;text-align:left;margin:12px 0}
.roleMode{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--ink-dim);align-items:center}
.roleTemplates{display:flex;gap:7px;flex-wrap:wrap}
.roleTable{display:grid;gap:6px;max-height:42vh;overflow:auto;border:1px solid var(--panel-edge);border-radius:10px;padding:10px;background:rgba(0,0,0,.18)}
.roleLine{display:grid;grid-template-columns:1.2fr auto auto auto;gap:8px;align-items:center;font-size:13px}
.roleLine .roleName{font-family:'Noto Sans TC',sans-serif;font-size:13px;letter-spacing:1px;color:var(--ink);margin:0;text-align:left}
.roleLine .team{font-size:11px;color:var(--ink-dim)}
.countBtn{width:30px;height:28px;border-radius:8px;border:1px solid var(--panel-edge);background:rgba(42,51,82,.55);color:var(--ink);cursor:pointer}
.countBtn:hover{border-color:var(--candle)}
.roleCount{min-width:24px;text-align:center;font-weight:700;color:var(--candle)}
.boardStatus{font-size:13px;line-height:1.55;color:var(--ink-dim);padding:8px 10px;border:1px solid var(--panel-edge);border-radius:10px;background:rgba(9,12,24,.5)}
.boardStatus.ok{color:var(--good);border-color:rgba(127,174,139,.45)}
.boardStatus.bad{color:var(--blood);border-color:rgba(176,58,70,.55)}
.startModeTabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.presetSection{display:grid;gap:8px;text-align:left}
.presetSection h3{font-family:'Noto Serif TC',serif;color:var(--candle);font-size:15px;letter-spacing:2px;margin:4px 0 0}
.presetGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.presetCard{border:1px solid var(--panel-edge);border-radius:12px;padding:10px;background:rgba(0,0,0,.18);cursor:pointer;text-align:left;color:var(--ink);display:grid;gap:5px;transition:.15s}
.presetCard:hover{border-color:var(--candle);transform:translateY(-1px)}
.presetCard.selected{border-color:var(--candle);box-shadow:0 0 0 2px rgba(217,160,76,.14)}
.presetCard .pcTitle{font-family:'Noto Serif TC',serif;font-weight:900;color:var(--candle);font-size:14px}
.presetCard .pcRoles{font-size:12px;line-height:1.5;color:var(--ink-dim)}
.presetCard .pcRule{font-size:11px;color:var(--good)}
.presetCard.customCard .pcTitle{color:var(--moon)}
.playerCountBox{display:flex;align-items:center;justify-content:center;gap:12px;border:1px solid var(--panel-edge);border-radius:10px;padding:9px;background:rgba(0,0,0,.16)}
.playerCountBox strong{font-size:22px;color:var(--candle);min-width:48px;text-align:center}
.roleLine.lockedRole{opacity:.56;filter:saturate(.55)}
.roleLine.lockedRole .roleName::after{content:'  🔒 開發中';font-size:10px;color:var(--ink-dim)}
.roleLine .roleDesc{font-size:10.5px;color:var(--ink-dim);line-height:1.35;margin-top:2px}
@media (max-width:700px){.presetGrid{grid-template-columns:1fr}}
@media (max-width:900px){
  main{flex-direction:column}
  #tableWrap{flex:0 0 46vh}
  #logPanel{max-width:none;flex:1}
  .seat{width:84px}.seat .avatar{width:46px;height:46px;font-size:22px}
  .seat .voteHint{left:52px;top:8px;font-size:9.5px;max-width:70px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.trainGrid{display:grid;grid-template-columns:1fr;gap:8px;text-align:left;margin:12px 0}
.trainItem{border:1px solid var(--panel-edge);border-radius:10px;padding:9px 10px;background:rgba(0,0,0,.18);line-height:1.55}
.trainItem label{display:flex;gap:8px;align-items:flex-start;cursor:pointer}
.trainItem b{color:var(--candle)}
.trainCount{font-size:12px;color:var(--ink-dim);margin-top:4px;padding-left:24px}
.caseBox{max-height:300px;overflow:auto;text-align:left;border:1px solid var(--panel-edge);border-radius:10px;padding:10px;background:rgba(0,0,0,.18);margin-top:10px}
.caseBox h3{color:var(--candle);font-size:14px;margin:10px 0 4px}
.caseBox p{font-size:12.5px;color:var(--ink-dim);line-height:1.6;margin-bottom:6px}
.trainTools{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>月蝕之村 <em>Notte di Luna</em></h1>
    <div id="phaseBadge">序幕</div>
    <div id="aiToggleWrap">
      <label><input type="checkbox" id="aiToggle" checked>使用 LLM（API）</label>
      <label><input type="checkbox" id="fairModeToggle" checked>AI公平模式</label>
      <button class="miniBtn" id="boardCfgBtn" type="button">板子設定</button>
      <button class="miniBtn" id="apiCfgBtn" type="button">API設定</button>
      <button class="miniBtn" id="knowledgeBtn" type="button">AI觀念庫</button>
      <button class="miniBtn" id="trainingBtn" type="button">AI特訓</button>
      <label class="speedWrap">AI反應 <input type="range" id="aiSpeed" min="2000" max="5000" step="100" value="3500"><span id="aiSpeedText">3.5s</span></label>
    </div>
  </header>
  <main>
    <div id="tableWrap">
      <div id="eclipse">
        <div class="ph-icon" id="phIcon">🌑</div>
        <div class="ph-day" id="phDay">月蝕之夜</div>
        <div class="ph-txt" id="phTxt">村莊尚未甦醒</div>
      </div>
    </div>
    <aside id="logPanel">
      <div class="lp-head"><span>村 莊 紀 事</span><button class="logCopyBtn" id="copyLogBtn" type="button">複製</button></div>
      <div id="log"></div>
      <section id="infoBox"><div class="lp-head">個 人 資 訊</div><div id="infoList">尚未分發身分。</div></section>
    </aside>
  </main>
  <footer><div id="controls"><span class="hint">主選單載入中……</span></div></footer>
</div>
<div id="overlay"><div id="modal"></div></div>
<script>
/* ===== 月蝕之村 v0.7.2 — 六人屠城勝利 / 嚴格視角隔離 / 6~12人動態板子 / 守衛 / 白狼王 / 全獵人連鎖槍 =====
   規則引擎：懷疑度模型 / 投票 / 夜間策略
   LLM層：發言生成 + 玩家自由發言解析（可離線退回模板+關鍵詞） */

/* ---------- 基礎資料 ---------- */
const ROLES={
  WOLF_KING:{key:'WOLF_KING',name:'狼王',team:'wolf',icon:'👑',implemented:true,desc:'狼人陣營。被刀、被放逐、被獵人槍殺或被騎士決鬥出局時，可發動技能帶走一名玩家；只有被女巫毒死無法發動。'},
  WHITE_WOLF_KING:{key:'WHITE_WOLF_KING',name:'白狼王',team:'wolf',icon:'🐺👑',implemented:true,desc:'狼人陣營。只能在自己的白天發言回合結束前自爆，並帶走一名玩家；被帶走者不能發動死亡技能，之後直接入夜。'},
  WOLF:{key:'WOLF',name:'狼人',team:'wolf',icon:'🐺',implemented:true,desc:'狼人陣營。每晚與同伴共同襲擊一名玩家。'},
  WOLF_BEAUTY:{key:'WOLF_BEAUTY',name:'狼美人',team:'wolf',icon:'🌹',implemented:false,desc:'預留身分。每晚魅惑一人，死亡時可令魅惑者殉情。'},
  GARGOYLE:{key:'GARGOYLE',name:'石像鬼',team:'wolf',icon:'🗿',implemented:false,desc:'預留身分。不與狼隊互認，每晚查驗真實身分，狼隊全滅後取得狼刀。'},

function normalizeCounts(counts){
  const out={};ROLE_ORDER.forEach(k=>out[k]=Math.max(0,Math.floor(Number(counts?.[k]||0))));return out;
}
function deckFromCounts(counts){
  const deck=[];ROLE_ORDER.forEach(k=>{for(let i=0;i<(counts[k]||0);i++)deck.push(k);});return deck;
}
function makeCustomStarterCounts(n){
  n=clamp(Math.floor(Number(n)||10),6,12);
  const c=normalizeCounts({});
  const wolfCount=n>=11?4:(n>=8?3:2);
  c.WOLF=wolfCount;c.SEER=1;c.WITCH=1;c.VILLAGER=Math.max(0,n-wolfCount-2);
  return c;
}
function makeRandomChaosCounts(){
  const counts=normalizeCounts({});
  const pool=ROLE_ORDER.filter(k=>ROLES[k].implemented);
  for(let i=0;i<G.playerCount;i++)counts[rnd(pool)]++;
  return counts;
}
function exactTemplateCounts(key){
  const tpl=BOARD_TEMPLATES[key];
  if(!tpl)return null;
  return normalizeCounts(JSON.parse(JSON.stringify(tpl.counts||{})));
}
function makeDeck(){
  if(!G.roleCounts)G.roleCounts={...DEFAULT_COUNTS};
  G.roleCounts=normalizeCounts(G.roleCounts);
  G.activeSpecialRole=(G.roleCounts.KNIGHT||0)>0?'KNIGHT':((G.roleCounts.GUARD||0)>0?'GUARD':((G.roleCounts.IDIOT||0)>0?'IDIOT':'CUSTOM'));
  return deckFromCounts(G.roleCounts);
}
function boardSummary(counts=G.roleCounts){
  counts=normalizeCounts(counts);
  return ROLE_ORDER.filter(k=>counts[k]>0).map(k=>`${ROLES[k].icon}${ROLES[k].name}×${counts[k]}`).join('、')||'空牌堆';
}
function boardTotal(counts=G.roleCounts){return Object.values(normalizeCounts(counts)).reduce((a,b)=>a+b,0);}
function boardTeamCounts(counts=G.roleCounts){
  counts=normalizeCounts(counts);let wolf=0,good=0;
  ROLE_ORDER.forEach(k=>{if(ROLES[k].team==='wolf')wolf+=counts[k];else good+=counts[k];});
  return {wolf,good,total:wolf+good};
}
function boardValidation(counts=G.roleCounts,mode=G.ruleMode,playerCount=G.playerCount){
  counts=normalizeCounts(counts);playerCount=clamp(Math.floor(Number(playerCount)||10),6,12);
  const t=boardTeamCounts(counts);
  if(t.total!==playerCount)return {ok:false,msg:`目前 ${t.total}/${playerCount} 張，必須剛好${playerCount}張。`};
  const locked=ROLE_ORDER.filter(k=>!ROLES[k].implemented&&(counts[k]||0)>0);
  if(locked.length)return {ok:false,msg:`以下身分仍在開發中，暫時不能加入：${locked.map(k=>ROLES[k].name).join('、')}`};
  if(((counts.SEER||0)+(counts.SPIRIT||0))>1)return {ok:false,msg:'預言家或通靈師只能選一張，不能同時上場。'};
  if(t.wolf<1||t.good<1)return {ok:false,msg:'至少要有1張狼人陣營與1張好人陣營。'};
  if(mode==='standard'&&t.wolf>=t.good)return {ok:false,msg:'標準模式中，狼人數必須少於好人數。'};
  return {ok:true,msg:`目前 ${t.total}/${playerCount} 張｜狼人陣營 ${t.wolf}｜好人陣營 ${t.good}｜${mode==='fun'?'娛樂模式':'標準模式'}`};
}

    req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(TRAINING_DB_STORE)){const st=db.createObjectStore(TRAINING_DB_STORE,{keyPath:'id'});st.createIndex('ts','ts',{unique:false});} if(!db.objectStoreNames.contains(EXPERIENCE_DB_STORE)){const ex=db.createObjectStore(EXPERIENCE_DB_STORE,{keyPath:'id'});ex.createIndex('ts','ts',{unique:false});ex.createIndex('tag','tag',{unique:false});}};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}

async function trimTrainingRecords(limit=5000){
  try{
    const db=await openTrainingDB();
    const tx=db.transaction(TRAINING_DB_STORE,'readwrite');
    const st=tx.objectStore(TRAINING_DB_STORE);const idx=st.index('ts');
    const countReq=st.count();
    countReq.onsuccess=()=>{let extra=countReq.result-limit;if(extra<=0)return;const cur=idx.openCursor();cur.onsuccess=e=>{const c=e.target.result;if(c&&extra>0){st.delete(c.primaryKey);extra--;c.continue();}};};
  }catch(e){}
}

function clampTrainWeight(v){return Math.max(0,Math.min(8,Number(v)||0));}

function defaultExperienceStats(){
  return {games:0,items:0,goodWins:0,wolfWins:0,correctWolfReads:0,wrongGoodPushes:0,sameVoteKnownWolf:0,endgameCorrectVotes:0,knightHit:0,hunterHit:0,witchPoisonWolf:0};
}
function normalizeExperienceStats(raw={}){
  return {...defaultExperienceStats(),...(raw||{})};
}
function bumpExperienceStats(exp={}){
  G.experienceStats=normalizeExperienceStats(G.experienceStats);
  const m=exp.metrics||{};
  Object.keys(defaultExperienceStats()).forEach(k=>{
    if(k==='games'||k==='items')return;
    if(Number(m[k]))G.experienceStats[k]=(G.experienceStats[k]||0)+Number(m[k]);
  });
  if(exp.winner==='good')G.experienceStats.goodWins=(G.experienceStats.goodWins||0)+1;
  if(exp.winner==='wolf')G.experienceStats.wolfWins=(G.experienceStats.wolfWins||0)+1;
}
function experienceStatSummary(){
  const s=normalizeExperienceStats(G.experienceStats);
  const total=(s.goodWins||0)+(s.wolfWins||0);
  const win=total?`好人勝率${Math.round(s.goodWins/total*100)}%／狼人勝率${Math.round(s.wolfWins/total*100)}%`:'尚無勝率';
  return `${win}｜抓狼${s.correctWolfReads||0}｜推錯好人${s.wrongGoodPushes||0}｜同票狼線${s.sameVoteKnownWolf||0}｜終局投對${s.endgameCorrectVotes||0}`;
}
function defaultBotBrainWeights(){const o={};Object.keys(TRAINING_TAGS).forEach(k=>o[k]=0);return o;}

  try{G.botBrainWeights={...defaultBotBrainWeights(),...(JSON.parse(safeGet('moonVillageBotBrainWeights','{}')||'{}'))};}catch(e){G.botBrainWeights=defaultBotBrainWeights();}

  G.selfTrainDefault=clamp(parseInt(safeGet('moonVillageSelfTrainDefault','32'),10)||32,1,9999);

function botBrainSummary(){
  const w=G.botBrainWeights||{};
  const active=Object.entries(TRAINING_TAGS).filter(([k])=>clampTrainWeight(w[k])>0).map(([k,v])=>`${v.label}+${clampTrainWeight(w[k]).toFixed(1)}`);

function applyExperienceTags(tags,rate=0.08){
  if(!G.botBrainWeights)G.botBrainWeights=defaultBotBrainWeights();
  const seen={};
  (tags||[]).filter(tag=>tag in TRAINING_TAGS).forEach(tag=>{
    seen[tag]=(seen[tag]||0)+1;
    const old=clampTrainWeight(G.botBrainWeights[tag]||0);
    const repeatPenalty=seen[tag]>1?0.45:1;
    const gain=rate*repeatPenalty*(1-old/8); // 邊際遞減：越接近+8越難灌滿
    G.botBrainWeights[tag]=clampTrainWeight(old+gain);
  });
  saveBotBrain();
}

function buildFinishedGameExperience(winner){
  const wolfSeats=G.players.filter(p=>isWolf(p)).map(p=>p.seat);
  const tags=[]; const metrics={};
  const add=(tag,n=1)=>{if(tag in TRAINING_TAGS)tags.push(tag);metrics[tag]=(metrics[tag]||0)+n;};
  const revealedWolves=G.players.filter(p=>p.revealed==='wolf').map(p=>p.seat);
  const revealedGoods=G.players.filter(p=>p.revealed==='good'||p.claim==='女巫'||p.claim==='獵人'||p.claim==='騎士').map(p=>p.seat);
  (G.speechBriefs||[]).forEach(b=>{
    const targets=[...(b.suspects||[])]; if(b.voteIntent&&!targets.includes(b.voteIntent))targets.push(b.voteIntent);
    targets.forEach(t=>{
      if(revealedWolves.includes(t)){add('correctWolfRead');metrics.correctWolfReads=(metrics.correctWolfReads||0)+1;if(b.seat===G.human?.seat)add('humanSpeechParse');}
      if(revealedGoods.includes(t)){add('wrongGoodPush');metrics.wrongGoodPushes=(metrics.wrongGoodPushes||0)+1;}
      if(seatOf(t)?.claim==='獵人'&&!revealedWolves.includes(t))add('claimedHunterPushed');
    });
  });
  (G.voteHistory||[]).forEach(vh=>{
    (vh.ballots||[]).forEach(b=>{
      if(revealedWolves.includes(b.t)){metrics.correctWolfReads=(metrics.correctWolfReads||0)+1;if(vh.day>=3){add('endgameCorrectVote');metrics.endgameCorrectVotes=(metrics.endgameCorrectVotes||0)+1;}else add('correctWolfRead');}
      if(revealedGoods.includes(b.t)){add('wrongGoodPush');metrics.wrongGoodPushes=(metrics.wrongGoodPushes||0)+1;}
      const sameKnownWolf=(vh.ballots||[]).some(x=>x.v!==b.v&&x.t===b.t&&revealedWolves.includes(x.v));
      if(sameKnownWolf&&!revealedWolves.includes(b.t)){add('sameVoteKnownWolf');metrics.sameVoteKnownWolf=(metrics.sameVoteKnownWolf||0)+1;}
    });
  });
  if((G.players||[]).some(p=>p.revealed==='wolf'&&p.role==='WOLF_KING'))add('wolfKingHunterTiming');
  if((G.players||[]).some(p=>p.role==='KNIGHT'&&p.knightDuelResult==='wolf')){add('knightHitFollowup');metrics.knightHit=(metrics.knightHit||0)+1;}
  if((G.players||[]).some(p=>p.role==='HUNTER'&&p.hunterShotSeat&&isWolf(seatOf(p.hunterShotSeat))))metrics.hunterHit=(metrics.hunterHit||0)+1;
  if((G.players||[]).some(p=>p.role==='WITCH'&&p.poisonedSeat&&isWolf(seatOf(p.poisonedSeat))))metrics.witchPoisonWolf=(metrics.witchPoisonWolf||0)+1;
  if((G.players||[]).some(p=>p.claim==='預言家'&&!p.alive&&(p.deathCause==='knife'||p.revealed==='good')))add('trueSeerLegacy');
  if((G.voteHistory||[]).some(v=>v.day>=3))add('endgameNoClaim');
  if((G.seerClaims||[]).length>=2)add('noSeerChain');
  if(G.players.some(w=>w.revealed==='wolf'&&w.claim==='預言家'&&(w.claimChecks||[]).some(c=>!c.wolf))){add('fakeSeerGoldChain');add('noSeerChain');}
  if(G.players.filter(p=>p.role==='VILLAGER'&&!p.alive).length>=2)add('protectVillagers');
  const unique=[...new Set(tags)];
  return {tag:unique[0]||'general',tags:unique,winner,day:G.day,board:boardSummary(),wolfSeats,metrics,summary:`勝方${winner}；狼隊${wolfSeats.join('、')||'無'}；重點：${unique.join('、')||'一般局譜'}；${experienceStatSummary()}`,speechBriefs:(G.speechBriefs||[]).slice(-80),votes:(G.voteHistory||[]).slice(-20)};
}

async function learnFromFinishedGame(winner){
  const exp=buildFinishedGameExperience(winner);

  G.experienceStats=normalizeExperienceStats(G.experienceStats);
  G.experienceStats.items=(G.experienceStats.items||0)+1;
  bumpExperienceStats(exp);
  saveBotBrain();
  await saveExperienceRecord(exp);
}

    {tags:['voteTraceWeak','sameVoteKnownWolf'],summary:'已知狼同票線必須追責，尤其兩人一起推已跳神或抓狼命中者。',m:{sameVoteKnownWolf:1}},

    {tags:['protectVillagers','reasonableWrong'],summary:'4神3民板子要同時保神與保民；合理推錯只小扣，不可暴民化。',m:{}}

async function runSelfTrainingGames(count=32){
  count=Math.max(1,Math.min(parseInt(count,10)||32,G.selfTrainMax||320));
  const oldDelay=G.aiDelay;
  const tagCounts={};
  for(let i=0;i<count;i++){
    const exp=syntheticTrainingCase(i);
    exp.tags.forEach(t=>tagCounts[t]=(tagCounts[t]||0)+1);
    applyExperienceTags(exp.tags,0.035);
    bumpExperienceStats(exp);
    await saveExperienceRecord(exp);
    if(i%8===7)await sleep(0);
  }
  G.experienceStats.games=(G.experienceStats.games||0)+count;
  G.experienceStats.items=(G.experienceStats.items||0)+count;
  G.aiDelay=oldDelay;
  saveBotBrain();
  return tagCounts;
}

function trainingLevel(tag){return Math.min(5,Math.max(0,+(G.aiTraining?.[tag]||0)));}
function trainingBias(tag,unit=0.08){return (trainingLevel(tag)+clampTrainWeight(G.botBrainWeights?.[tag]||0))*unit;}

function publicKnownWolf(p){return !!(p&&p.revealed==='wolf');}
function publicKnownGood(p){return !!(p&&p.revealed==='good');}
function publicGoodPowerOrHardClaim(p){return !!(p&&(p.revealed==='good'||['女巫','獵人','騎士','預言家','通靈師'].includes(p.claim)||['WITCH','HUNTER','KNIGHT','SEER','SPIRIT'].includes(p.role)&&p.revealed==='good'));}
function playerReasoningCredit(seat){
  const res={trust:0,suspicion:0,logic:0,notes:[],metrics:{correctWolfReads:0,wrongGoodPushes:0,sameVoteKnownWolf:0,endgameCorrectVotes:0}};
  const p=seatOf(seat); if(!p)return res;
  const briefs=(G.speechBriefs||[]).filter(b=>b.seat===seat);
  briefs.forEach(b=>{
    const targets=[...(b.suspects||[])]; if(b.voteIntent&&!targets.includes(b.voteIntent))targets.push(b.voteIntent);
    targets.forEach(t=>{
      const tp=seatOf(t); if(!tp||t===seat)return;
      const strong=(b.voteIntent===t||/高度|狼面|票/.test(b.summary||''))?1.25:1;
      if(publicKnownWolf(tp)){
        res.trust+=0.10*strong+trainingBias('correctWolfRead',0.012);
        res.logic+=0.12*strong;
        res.metrics.correctWolfReads++;
        res.notes.push(`曾抓${t}號狼`);
      }else if(publicKnownGood(tp)||publicGoodPowerOrHardClaim(tp)){
        const reasonable=G.players.some(w=>publicKnownWolf(w)&&w.claim==='預言家'&&(w.claimChecks||[]).some(c=>c.target===t&&!c.wolf));
        if(reasonable){res.logic-=0.02;res.notes.push(`推${t}號有狼預金水鏈依據`);}else{
          res.suspicion+=0.10*strong+trainingBias('wrongGoodPush',0.012);
          res.logic-=0.10*strong;
          res.metrics.wrongGoodPushes++;
          res.notes.push(`曾推${t}號好人/神職`);
        }
      }
      if(tp?.claim==='獵人'&&!publicKnownWolf(tp)){
        res.suspicion+=0.05+trainingBias('claimedHunterPushed',0.01);
        res.notes.push(`曾壓已跳獵人${t}號`);
      }
    });
  });
  (G.voteHistory||[]).forEach(vh=>{
    const my=(vh.ballots||[]).find(b=>b.v===seat); if(!my||!my.t)return;
    const mt=seatOf(my.t);
    if(publicKnownWolf(mt)){res.trust+=0.12+trainingBias('correctWolfRead',0.01);res.logic+=0.12;res.metrics.correctWolfReads++;if(vh.day>=3){res.metrics.endgameCorrectVotes++;res.trust+=0.06+trainingBias('endgameCorrectVote',0.01);res.notes.push(`終局/後期投中${my.t}號狼`);}else res.notes.push(`投過${my.t}號狼`);}
    if(publicKnownGood(mt)||publicGoodPowerOrHardClaim(mt)){res.suspicion+=0.08+trainingBias('wrongGoodPush',0.01);res.logic-=0.08;res.metrics.wrongGoodPushes++;res.notes.push(`投過${my.t}號好人/神職`);}
    const knownWolfSame=(vh.ballots||[]).filter(b=>b.v!==seat&&b.t===my.t&&publicKnownWolf(seatOf(b.v)));
    if(knownWolfSame.length&&!(mt&&publicKnownWolf(mt))){
      res.suspicion+=0.12*knownWolfSame.length+trainingBias('sameVoteKnownWolf',0.012);
      res.metrics.sameVoteKnownWolf+=knownWolfSame.length;
      res.notes.push(`與已知狼同票打${my.t}號`);
    }
  });
  const wolves=G.players.filter(publicKnownWolf);
  wolves.forEach(w=>{
    if((G.speechBriefs||[]).some(b=>b.seat===w.seat&&((b.suspects||[]).includes(seat)||b.voteIntent===seat))){
      res.trust+=0.09+trainingBias('attackedByWolfTrust',0.01);
      res.notes.push(`被${w.seat}號狼攻擊`);
    }
    (G.voteHistory||[]).forEach(vh=>{const wb=(vh.ballots||[]).find(b=>b.v===w.seat); if(wb?.t===seat){res.trust+=0.06;res.notes.push(`被${w.seat}號狼投過`);}});
  });
  res.trust=clamp(res.trust,0,0.65);res.suspicion=clamp(res.suspicion,0,0.85);res.logic=clamp(res.logic,-1,1);
  res.notes=[...new Set(res.notes)].slice(0,3);
  return res;
}
function reasoningCreditSummary(){
  const rows=alive().map(p=>({seat:p.seat,c:playerReasoningCredit(p.seat)})).filter(x=>x.c.notes.length);
  rows.sort((a,b)=>(b.c.trust-b.c.suspicion)-(a.c.trust-a.c.suspicion));
  return rows.slice(0,6).map(x=>`${x.seat}號：${x.c.notes.join('、')}`).join('；');
}
function trainingSummary(){
  const manual=Object.entries(TRAINING_TAGS).filter(([k])=>trainingLevel(k)>0).map(([k,v])=>`${v.label}×${trainingLevel(k)}`);

  return '尚未累積特訓標籤';
}

function seerChainLines(){
  const claims=G.players.filter(p=>p.claim==='預言家'||G.seerClaims.includes(p.seat));
  const lines=[];
  claims.forEach(p=>{
    const checks=(p.claimChecks||[]).map(c=>`${c.wolf?'查殺':'金水'}${c.target}號`).join('、')||'尚未公開驗人';
    const state=!p.alive?(p.deathCause==='knife'?'夜死':p.deathCause==='vote'?'被放逐':'已出局'):'存活';
    lines.push(`${p.seat}號預言家(${state})：${checks}`);
  });
  return lines;
}
function seerChainActive(){return seerChainLines().length>=2||G.players.some(p=>p.claim==='預言家'&&!p.alive)||publicInfoSummaryLines().some(x=>/預言家/.test(x));}
function seerChainAdvice(){

function seatLabel(seat){

function enforceSeatNumberSpeech(text,bot=null){
  let s=String(text||'').replace(/\s+/g,' ').trim();
  // LLM有時會把「幾號」省略成名字；先把名字補回座號。
  for(const p of G.players){
    if(!p.name||p.name==='你')continue;
    const re=new RegExp(`(?<!\\d號\\s*)${p.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}`,'g');
    s=s.replace(re,`${p.seat}號${p.name}`);
  }
  // 如果AI發言完全沒座號，但規則腦有要求，至少不要讓它講成抽象廢話。
  if(bot&&/(預言家鏈|金水鏈|查殺鏈|外置位|資訊少|問號|狼坑|懷疑|可信|信任)/.test(s)&&!/(1[0-2]|[1-9])號/.test(s)){
    const chain=seerChainAdvice();
    if(chain)s=`${chain} ${s}`;
  }
  return s;
}
function limitAiPublicThought(text,maxSentences=2,maxChars=180){
  // 給AI公開描述想法，但最多兩句，避免聊天欄變作文或洩漏長推理。
  let s=String(text||'').replace(/\s+/g,' ').trim();
  if(!s)return s;
  s=s.replace(/^(?:發言|speech|內容)[：:]\s*/i,'');
  s=s.replace(/[「」]/g,'');
  const parts=s.match(/[^。！？!?；;]+[。！？!?；;]?/g)||[s];
  s=parts.slice(0,maxSentences).join('').trim();
  if(!/[。！？!?]$/.test(s)&&parts.length>1)s+='。';
  if(s.length>maxChars)s=s.slice(0,maxChars).replace(/[，、：:；;][^，、：:；;]*$/,'')+'。';
  return s;
}
function polishAiSpeech(text,bot=null,maxChars=180){
  return limitAiPublicThought(enforceSeatNumberSpeech(text,bot),2,maxChars);
}

/* ---------- 中文狼人殺語意解析：分段、歸票、倒鉤/衝鋒/潛水、心路歷程 ---------- */
function uniqNums(arr){return [...new Set((arr||[]).map(Number).filter(n=>n>=1&&n<=G.playerCount))];}
function addNum(list,n,selfSeat){n=Number(n);if(n>=1&&n<=G.playerCount&&n!==selfSeat&&!list.includes(n))list.push(n);}
function addNums(list,nums,selfSeat){(nums||[]).forEach(n=>addNum(list,n,selfSeat));}
function normalizeSpeechText(text){return String(text||'').replace(/[０-９]/g,ch=>'0123456789'['０１２３４５６７８９'.indexOf(ch)]).replace(/，/g,',').replace(/；/g,';').replace(/：/g,':').trim();}
function splitChineseClauses(text){
  const raw=normalizeSpeechText(text);
  return raw
    .replace(/([。！？!?；;])/g,'$1|')
    .replace(/,/g,'|')
    .replace(/(但是|可是|不過|但|然而|後來|現在|結果|所以|因此|另外|然後|至於|反而)/g,'|$1')
    .split('|').map(s=>s.trim()).filter(Boolean);
}
function clauseNumbers(clause){
  const s=String(clause||''); const nums=[];
  [...s.matchAll(/(1[0-2]|[1-9])\s*號/g)].forEach(m=>nums.push(+m[1]));
  if(/金水|銀水|鐵好|偏好|放好|認好|信|觀察|保留|狼坑|狼面|狼位|懷疑|疑惑|怪|可疑|不對勁|查殺|悍跳|倒鉤|衝鋒|潛水|划水|票|投|出|歸|拍|表水|保|踩|站|打|抗推|切割|賣隊友/.test(s)){
    [...s.matchAll(/(?:^|[^\d])((?:1[0-2]|[1-9])(?:\s*[、,和跟與及]\s*(?:1[0-2]|[1-9])){0,6})(?=[^\d]|$)/g)].forEach(m=>{
      String(m[1]).split(/[、,和跟與及\s]+/).forEach(x=>{const n=+x;if(n>=1&&n<=G.playerCount)nums.push(n);});
    });
  }
  return uniqNums(nums);
}
function extractVoteTargetFromClause(clause,selfSeat){
  const s=String(clause||'').replace(/\s+/g,'');
  const patterns=[
    /(?:票|投|出|歸票|歸|放逐|掛|今天先|今天就|今天|今晚先|今晚|這把|這輪|本輪)(?:出|投|票|歸|放逐)?(1[0-2]|[1-9])號?/,
    /(?:先|直接|優先)(?:出|投|票|歸)(1[0-2]|[1-9])號?/,
    /(1[0-2]|[1-9])號?(?:出局|出|票|歸|放逐|上票|掛票)/
  ];
  for(const re of patterns){const m=s.match(re); if(m){const n=+m[1]; if(n>=1&&n<=G.playerCount&&n!==selfSeat)return n;}}
  return null;
}
function interpretChineseWolfSpeech(text,selfSeat=0){
  const raw=String(text||'');
  const clauses=splitChineseClauses(raw);
  const r={raw,clauses,claim:null,checks:[],accuse:[],strongAccuse:[],trust:[],strongTrust:[],observe:[],vote:null,asksClaim:[],witch:{saved:null,poisoned:null},behaviorTags:{hook:[],charge:[],lurk:[],cut:[],defend:[],push:[],scapegoat:[]},shifts:[],currentRead:{}};
  r.claim=typeof explicitSelfClaimRole==='function'?explicitSelfClaimRole(raw):null;
  let previousMemory=[];
  let activeTargets=[];
  clauses.forEach(clause=>{
    let nums=clauseNumbers(clause).filter(n=>n!==selfSeat);
    const pronounRef=/(他|她|這張牌|該玩家|這個人|此人|這張)/.test(clause);
    if(!nums.length && pronounRef && activeTargets.length)nums=[...activeTargets];
    const hasPast=/(本來|原本|之前|剛開始|一開始|先前|前面)/.test(clause);
    const hasTurn=/(但|但是|可是|不過|後來|現在|結果|反而|改盤|重盤|我收回|改信|改打|回頭看)/.test(clause);
    const vote=extractVoteTargetFromClause(clause,selfSeat);
    if(vote){r.vote=vote; addNum(r.accuse,vote,selfSeat); addNum(r.behaviorTags.push,vote,selfSeat); r.currentRead[vote]='vote';}
    if(/拍身分|拍身份|交身分|交身份|表水|解釋/.test(clause)) { addNums(r.asksClaim,nums,selfSeat); addNums(r.observe,nums,selfSeat); }
    const strongTrust=/鐵好|坐好|明好|真好|金水|銀水|已證好|確認好|定好|好人牌|確好/.test(clause);
    const trust=/偏好|放好|認好|信任|相信|可信|暫信|先信|比較信|站邊|我站|我認|先放|不急著出|不像狼|不是狼|別打/.test(clause)||strongTrust;
    const strongAccuse=/查殺|鐵狼|定狼|爆狼|必狼|悍跳|裸狼|一定是狼|狼王|狼預/.test(clause);
    const accuse=/狼坑|狼面|狼位|狼隊|懷疑|怪|奇怪|可疑|不對勁|不舒服|踩|打|想出|想票|要出|衝票|帶票|抗推/.test(clause)||strongAccuse;
    const observe=/觀察|保留|問號|再看|回看|不完全放下|輕微疑問|放進重點|看後續|先聽|待定|疑惑/.test(clause);
    if(hasPast && nums.length){
      const past=strongTrust?'強信任':trust?'信任':strongAccuse?'強懷疑':accuse?'懷疑':observe?'觀察':'提及';
      previousMemory=nums.map(n=>({target:n,from:past,clause}));
      activeTargets=nums.slice();
      if(!hasTurn)return;
    }
    if(nums.length && !/(保|幫|站邊|力保|硬保|強保)/.test(clause))activeTargets=nums.slice();
    if(strongTrust){addNums(r.trust,nums,selfSeat);addNums(r.strongTrust,nums,selfSeat);}
    else if(trust && !accuse){addNums(r.trust,nums,selfSeat);}
    if(strongAccuse){addNums(r.accuse,nums,selfSeat);addNums(r.strongAccuse,nums,selfSeat);}
    else if(accuse){addNums(r.accuse,nums,selfSeat);}
    if(observe && !strongTrust && !strongAccuse)addNums(r.observe,nums,selfSeat);

    const defendLike=/(保|力保|硬保|強保|站邊|幫)/.test(clause);
    // 「5號衝鋒保1」：5是衝鋒者，1是被保者；不要把1也當衝鋒狼。
    const actorNums=(defendLike && nums.length>1)?[nums[0]]:nums;
    const defendedNums=(defendLike && nums.length>1)?nums.slice(1):[];
    if(/倒鉤|賣隊友|狼踩狼|踩狼洗白|切隊友|打狼太準|連續踩狼|身上有功勞|功勞太大/.test(clause)){addNums(r.behaviorTags.hook,actorNums,selfSeat);addNums(r.accuse,actorNums,selfSeat);}
    if(/衝鋒|硬保|強保|保狼|幫狼|幫狼說話|幫狼預|打工|站邊太死|死保/.test(clause)){addNums(r.behaviorTags.charge,actorNums,selfSeat);addNums(r.accuse,actorNums,selfSeat);}
    if(/潛水|划水|沒內容|低資訊|不交站邊|躲視角|只復讀|沒狼坑|空話/.test(clause)){addNums(r.behaviorTags.lurk,actorNums,selfSeat);addNums(r.observe,actorNums,selfSeat);}
    if(/切割|切隊友|拉開距離|互踩|互打/.test(clause)){addNums(r.behaviorTags.cut,actorNums,selfSeat);addNums(r.behaviorTags.hook,actorNums,selfSeat);}
    if(defendLike){addNums(r.behaviorTags.defend,defendedNums.length?defendedNums:nums,selfSeat);}
    if(/抗推|被推|被帶票|被衝票|被做成焦點/.test(clause))addNums(r.behaviorTags.scapegoat,actorNums,selfSeat);
    if((r.claim==='預言家'||r.claim==='通靈師')&&nums.length){
      if(/查殺|驗.*狼|是狼|狼人/.test(clause))nums.forEach(n=>r.checks.push({target:n,result:'狼'}));
      else if(/金水|驗.*好|好人|是好/.test(clause))nums.forEach(n=>r.checks.push({target:n,result:'好'}));
    }
    if(r.claim==='女巫'&&nums.length){
      if(/毒|投毒|毒了|撒毒|毒口/.test(clause))r.witch.poisoned=nums[0];
      if(/救|銀水|解藥|用藥/.test(clause))r.witch.saved=nums[0];
    }
    if(hasTurn && previousMemory.length){
      previousMemory.forEach(pm=>{
        const applies=nums.includes(pm.target)||(!nums.length&&activeTargets.includes(pm.target));
        if(applies){ const to=strongAccuse?'強懷疑':accuse?'懷疑':strongTrust?'強信任':trust?'信任':observe?'觀察':/倒鉤/.test(clause)?'倒鉤懷疑':/衝鋒/.test(clause)?'衝鋒懷疑':'重盤'; r.shifts.push({target:pm.target,from:pm.from,to,reason:clause}); }
      });
    }
  });
  r.accuse=uniqNums(r.accuse); r.strongAccuse=uniqNums(r.strongAccuse); r.trust=uniqNums(r.trust); r.strongTrust=uniqNums(r.strongTrust); r.observe=uniqNums(r.observe);
  const accusedSet=new Set(r.accuse), trustedSet=new Set(r.trust);
  r.trust=r.trust.filter(n=>!accusedSet.has(n)||r.strongTrust.includes(n)&&!r.strongAccuse.includes(n));
  r.observe=r.observe.filter(n=>!accusedSet.has(n)&&!trustedSet.has(n));
  Object.keys(r.behaviorTags).forEach(k=>r.behaviorTags[k]=uniqNums(r.behaviorTags[k]));
  r.checks=[...new Map(r.checks.filter(c=>c&&c.target>=1&&c.target<=G.playerCount&&c.target!==selfSeat).map(c=>[c.target+'-'+c.result,c])).values()];
  r.asksClaim=uniqNums(r.asksClaim).filter(n=>n!==selfSeat);
  r.shifts=r.shifts.filter(x=>x&&x.target!==selfSeat);
  return r;
}

/* ---------- AI判讀層：先讀發言證據，再選擇懷疑/信任話術 ---------- */
function getSpeechStats(seat){
  const p=seatOf(seat); if(!p)return null;
  if(!p.speechStats)p.speechStats={accused:[],trusted:[],hardPushTargets:[],falseAccuse:0,lowInfoTalks:0,cautiousTrustTargets:[],overGuaranteeTargets:[],claims:[],lastTexts:[]};
  return p.speechStats;
}
function analyzeSpeechText(text){
  const raw=String(text||'');
  const sem=interpretChineseWolfSpeech(raw,G?.human?.seat||0);
  const seats=uniqNums((sem.clauses||[]).flatMap(clauseNumbers));
  const hasClaim=/(我是|我跳|跳|我拍|我翻牌|我底牌是|我身分是|我身份是)(預言家|通靈師|女巫|獵人|騎士|白癡|平民|民牌)/.test(raw.replace(/\s+/g,''));
  const isLowInfo=/(沒|沒有|資訊少|無視角|先聽|觀望|先過|不急|先記|聽完整輪|暫時先|暫時信|偏信|不敢保|不保死|先觀察|潛水|划水)/.test(raw)&&!/(查殺|金水|銀水|出他|投他|狼坑|定狼|鐵狼|倒鉤|衝鋒)/.test(raw);
  const hardPush=!!(sem.vote||sem.strongAccuse.length||/(今天.*出|出他|投他|帶票|歸票|衝票|打死|一定是狼)/.test(raw));
  const accused=sem.accuse;
  const trusted=sem.trust;
  const cautiousTrust=!!(sem.observe.length||/(暫時.*信|偏信|先信|不敢保|不保死|先放一輪|再看|觀察|保留)/.test(raw))&&trusted.length&&!/(坐實|鐵好|一定真|不能出|保死|我保|高度信任)/.test(raw);
  const overGuarantee=/(坐實|鐵好|一定真|不能出|保死|我保|高度信任|絕對好人|已證好)/.test(raw);
  return{raw,seats,hasClaim,isLowInfo,hardPush,accused,trusted,cautiousTrust,overGuarantee,semantics:sem};
}
function recordSpeech(p,text){
  if(!p)return;
  const a=analyzeSpeechText(text);
  const st=getSpeechStats(p.seat);
  st.lastTexts.push({day:G.day,text:String(text||'')});
  if(st.lastTexts.length>8)st.lastTexts.shift();
  if(a.isLowInfo)st.lowInfoTalks++;
  if(a.hasClaim)st.claims.push({day:G.day,text:String(text||'')});
  a.accused.forEach(t=>{if(t!==p.seat&&!st.accused.includes(t))st.accused.push(t);});
  a.trusted.forEach(t=>{if(t!==p.seat&&!st.trusted.includes(t))st.trusted.push(t);});
  if(a.cautiousTrust)a.trusted.forEach(t=>{if(t!==p.seat&&!st.cautiousTrustTargets.includes(t))st.cautiousTrustTargets.push(t);});
  if(a.overGuarantee)a.trusted.forEach(t=>{if(t!==p.seat&&!st.overGuaranteeTargets.includes(t))st.overGuaranteeTargets.push(t);});
  if(a.overGuarantee&&a.trusted.length){

        G.aiJudgements.push({day:G.day,type:'overGuarantee',by:p.seat,target:t,reason:'未知身分過度擔保神職'});
      }
    });
  }
  if(a.hardPush)a.accused.forEach(t=>{if(t!==p.seat&&!st.hardPushTargets.includes(t))st.hardPushTargets.push(t);});

  // 指控驗證：說某人「帶票太急/跟風/衝票」，但目標實際只是觀望，視為錯誤指控。
  if(/(帶票太急|跟風|衝票|急著推|急著出)/.test(a.raw)){
    a.accused.forEach(t=>{
      const ts=getSpeechStats(t);
      const targetTexts=G.speechLog.filter(x=>x.day===G.day&&x.seat===t).map(x=>x.text).join(' ');
      const ta=analyzeSpeechText(targetTexts);
      if(ta.isLowInfo&&!ta.hardPush){
        st.falseAccuse++;
        alive().filter(b=>!b.isHuman&&!isWolf(b)&&b.seat!==p.seat).forEach(bot=>adjSusp(bot,p.seat,0.18));
        G.aiJudgements.push({day:G.day,type:'falseAccuse',by:p.seat,target:t,reason:'錯誤指控低資訊玩家帶票'});
      }
    });
  }
}


function classifySpeechForAI(p,text,extra={}){
  const raw=String(text||'').trim()||'（過麥）';
  const a=analyzeSpeechText(raw);
  const sem=a.semantics||interpretChineseWolfSpeech(raw,p?.seat||0);
  const parts=[];
  const explicit=typeof explicitSelfClaimRole==='function'?explicitSelfClaimRole(raw):null;
  const vote=sem.vote || (typeof extractVoteFromSpeech==='function'?extractVoteFromSpeech(raw,p):null);
  if(raw==='（過麥）'||/過麥|先過/.test(raw))parts.push('過麥/低資訊發言');
  if(explicit)parts.push(`自稱${explicit}`);
  if(extra.parsed?.claim)parts.push(`公開跳${extra.parsed.claim}`);
  if(extra.parsed?.checks?.length)extra.parsed.checks.forEach(c=>parts.push(`報${c.target}號${c.result==='狼'?'查殺':'金水'}`));
  if(extra.parsed?.witch?.saved)parts.push(`報${extra.parsed.witch.saved}號銀水/用藥暫放`);
  if(extra.parsed?.witch?.poisoned)parts.push(`報毒${extra.parsed.witch.poisoned}號`);
  if(extra.semi?.reason)parts.push(`LLM理由：${extra.semi.reason}`);
  const trusted=[...new Set([...(extra.parsed?.trust||[]),...(extra.semi?.trusted||[]),...sem.trust].map(Number).filter(n=>n>=1&&n<=G.playerCount&&n!==p.seat))];
  const accused=[...new Set([...(extra.parsed?.accuse||[]),...(extra.semi?.suspects||[]),...sem.accuse].map(Number).filter(n=>n>=1&&n<=G.playerCount&&n!==p.seat))];
  const observed=[...new Set([...(extra.parsed?.observe||[]),...sem.observe].map(Number).filter(n=>n>=1&&n<=G.playerCount&&n!==p.seat&&!trusted.includes(n)&&!accused.includes(n)))];
  trusted.slice(0,4).forEach(n=>parts.push(`${sem.strongTrust?.includes(n)?'強信任':'信任/暫放'}${n}號`));
  accused.slice(0,4).forEach(n=>parts.push(`${sem.strongAccuse?.includes(n)?'強懷疑':'懷疑/點名'}${n}號`));
  observed.slice(0,4).forEach(n=>parts.push(`觀察/保留${n}號`));
  const behaviorTags={...(sem.behaviorTags||{}),...(extra.parsed?.behaviorTags||{})};
  const tagNames={hook:'倒鉤',charge:'衝鋒',lurk:'潛水/划水',cut:'切割',defend:'保人/站邊',push:'帶票/歸票',scapegoat:'抗推'};
  Object.entries(tagNames).forEach(([k,label])=>{const nums=uniqNums(behaviorTags[k]||[]).filter(n=>n!==p.seat); if(nums.length)parts.push(`${label}標籤：${nums.slice(0,4).map(n=>n+'號').join('、')}`);});
  const shifts=[...(sem.shifts||[]),...(extra.parsed?.shifts||[])].filter(x=>x&&x.target!==p.seat);
  shifts.slice(0,3).forEach(s=>parts.push(`心路轉變：${s.target}號由${s.from||'先前看法'}轉為${s.to||'現在看法'}`));
  if(vote)parts.push(`明確歸票/投票意圖：${vote}號`);
  if(/預言家鏈|金水鏈|查殺鏈|盤.*預言家|不盤|盤金水|哪個是真|誰是真預言家/.test(raw))parts.push('要求優先盤預言家鏈/金水查殺鏈');
  if(/單跳|查殺位|表水|反打/.test(raw))parts.push('提到單跳查殺/表水壓力');
  if(a.cautiousTrust)parts.push('保留式站邊：偏信但不擔保');
  if(a.overGuarantee)parts.push('過度擔保語氣');
  if(a.isLowInfo&&!parts.some(x=>/自稱|報|投票|歸票|懷疑|信任|觀察|標籤|心路|要求/.test(x)))parts.push('低資訊/觀望發言');
  if(!parts.length)parts.push('一般態度發言，需結合上下文');
  return {day:G.day,seat:p.seat,name:p.name,text:raw,summary:`${p.seat}號${p.name}：${parts.join('；')}`,voteIntent:vote||null,suspects:accused,trusted,observed,behaviorTags,shifts};
}
function recordSpeechUnderstanding(p,text,extra={}){
  if(!p)return null;
  const b=classifySpeechForAI(p,text,extra);
  G.speechBriefs.push(b);
  if(G.speechBriefs.length>260)G.speechBriefs=G.speechBriefs.slice(-260);
  // 把「發言理解」也變成所有 AI 的可讀事件：不直接暴露真身分，只更新公開態度與投票意圖。
  b.suspects.forEach(t=>{if(t!==p.seat)G.aiJudgements.push({day:G.day,type:'speechAccuse',by:p.seat,target:t,reason:b.summary});});
  b.trusted.forEach(t=>{if(t!==p.seat)G.aiJudgements.push({day:G.day,type:'speechTrust',by:p.seat,target:t,reason:b.summary});});
  (b.observed||[]).forEach(t=>{if(t!==p.seat)G.aiJudgements.push({day:G.day,type:'speechObserve',by:p.seat,target:t,reason:b.summary});});
  Object.entries(b.behaviorTags||{}).forEach(([tag,nums])=>uniqNums(nums).forEach(t=>{if(t!==p.seat)G.aiJudgements.push({day:G.day,type:'speechBehavior',tag,by:p.seat,target:t,reason:b.summary});}));
  (b.shifts||[]).forEach(s=>{if(s?.target&&s.target!==p.seat)G.aiJudgements.push({day:G.day,type:'speechShift',by:p.seat,target:s.target,from:s.from,to:s.to,reason:b.summary});});
  if(b.voteIntent)G.aiJudgements.push({day:G.day,type:'speechVoteIntent',by:p.seat,target:b.voteIntent,reason:b.summary});
  updateAIMindsFromSpeechBrief(b,p);
  evaluatePressureResponse(p,text);
  return b;
}

function hasHardSuspicionReason(bot,seat){
  const p=seatOf(seat); const st=getSpeechStats(seat);
  if(!p)return false;
  if(p.revealed==='wolf')return true;
  if(st?.falseAccuse>0||st?.hardPushTargets?.length)return true;
  if(G.aiJudgements.some(j=>j.target===seat&&(j.type==='deathAccuse'||j.type==='overGuarantee'||j.type==='falseAccuse')))return true;
  if(G.players.some(q=>q.revealed==='wolf'&&q.claim==='預言家'&&(q.claimChecks||[]).some(c=>c.target===seat&&!c.wolf)))return true;
  if(G.aiJudgements.some(j=>j.type==='seerChainConfirmed'&&j.target===seat&&j.kind==='wolf'))return true;
  if(confirmedGoodSeerClaims().some(q=>(q.claimChecks||[]).some(c=>c.target===seat&&c.wolf)))return true;
  if(seerChainWolfModifier(bot,seat)>0.45)return true;
  if(p.claim==='預言家'||p.claim==='通靈師'){
    const deadSeer=G.players.some(q=>!q.alive&&q.claim==='預言家'&&q.deathCause==='knife');
    if(deadSeer&&G.day>=2)return true;
    if(G.seerClaims.filter(s=>seatOf(s)?.alive).length>=2)return true;
  }
  return (bot.susp?.[seat]??0)>0.78;
}
function allowedTrustLevel(bot,seat,desired){
  const p=seatOf(seat); if(!p)return 'low';
  if(p.revealed==='good')return desired;
  if(desired==='high'&&!p.revealed)return 'mid';
  if((p.claim==='預言家'||p.claim==='通靈師')&&!p.revealed){
    // 單跳或對跳神職都只能偏信/中信，未知身分不得直接擔保坐實。
    return desired==='high'?'mid':desired;
  }
  return desired;
}
function votePriorityScore(bot,seat){
  const p=seatOf(seat); if(!p||p.seat===bot.seat)return -999;
  if(p.revealed==='good'||isProtectedSoloSeer(bot,p)||isProtectedPublicInfoSeat(bot,p))return -999;
  ensureMind(bot);
  const j=judgementForTarget(bot,seat);
  let s=beliefWolfProb(bot,seat);
  const chainDelta=seerChainWolfModifier(bot,seat);
  if(chainDelta>0.35)s+=chainDelta+0.18;
  if(j.kind==='suspect'&&j.level==='high')s+=0.36;
  if(j.kind==='suspect'&&j.level==='mid')s+=0.18;
  if(hasHardSuspicionReason(bot,seat))s+=0.22;
  s+=voteTraceHeat(bot,seat);
  s+=knownWolfVoteEvasionHeat(bot,seat)*0.7;
  s+=relationHeat(bot,seat);
  const rc=playerReasoningCredit(seat);
  s+=rc.suspicion*0.85-rc.trust*0.70;
  if(p.claim==='預言家'||p.claim==='通靈師'){
    const cc=G.seerClaims.filter(x=>seatOf(x)?.alive).length;
    if(cc>=2)s+=Math.max(0,0.55-credOf(bot,seat))*0.4;
  }
  if(G.day===1&&isLowInfoOrCautiousSeat(seat)&&!hasHardSuspicionReason(bot,seat))s-=0.9+trainingBias('lowInfoMob',0.15);
  if(seerChainActive()&&G.day>=2&&j.level==='low'&&!hasHardSuspicionReason(bot,seat))s-=0.22;
  return s;
}

/* ---------- 公平反作弊裁判 ---------- */
const CHEAT_PENALTY=-100000000;
function isHiddenPowerRole(p){return !!(p&&ROLES[p.role]?.team==='good'&&p.role!=='VILLAGER');}
function hasNoPublicInfoForSeat(seat){

function noInfoNight(){
  return G.fairMode&&G.day===1&&!(G.speechLog||[]).length&&!(G.aiJudgements||[]).length&&!(G.seerClaims||[]).length;
}
function punishAICheat(actor,target,reason){
  if(!G.fairMode)return;
  const seats=actor? [actor.seat] : wolves().filter(w=>!w.isHuman).map(w=>w.seat);
  G.aiCheatAudits=G.aiCheatAudits||[];
  seats.forEach(seat=>{
    const bot=seatOf(seat); if(!bot||bot.isHuman)return;
    bot.cheatScore=(bot.cheatScore||0)+CHEAT_PENALTY;
    bot.susp={...(bot.susp||{})};
    Object.keys(bot.susp).forEach(k=>bot.susp[k]=0.50); // 作弊者記憶強制重置，不能繼續吃偷看的權重。
    G.aiCheatAudits.push({day:G.day,by:seat,target:target?.seat||target||null,penalty:CHEAT_PENALTY,reason});
  });
  G.antiCheatScore=(G.antiCheatScore||0)+CHEAT_PENALTY*Math.max(1,seats.length);
  if(typeof sys==='function')sys(`🚫 公平反作弊：偵測到疑似偷看身分「${reason}」，作弊AI扣一億點並重置該判斷。`,'important');
}
function fairNightKillPool(cand){
  // 首夜無公開資訊時，狼隊只能在所有非狼玩家中等機率盲刀。
  // 禁止裁判先看真身分再替狼隊避開神職或挑平民，否則結果本身仍是上帝視角。
  return [...cand];

  return best;
}
function speechNeedsLLM(bot,events,desc,fb){
  if(!apiReady()||!G.aiOn)return false;
  if(!bot||bot.isHuman)return false;
  const eventTypes=(events||[]).map(e=>e.type).join('|');
  const text=[desc||'',fb||'',eventTypes].join(' ');
  if(/CLAIM|CHECK_WOLF|CHECK_GOOD|WITCH_INFO/.test(eventTypes))return true;
  if(/悍跳|對跳|查殺|金水|女巫|騎士|決鬥|切割|狼隊已進入|預言家鏈|已證假預|銀水/.test(text))return true;
  if(isWolf(bot)&&(bot.wolfTactic==='FAKE'||bot.wolfTactic==='CUT'))return true;
  return false;
}

function judgementForTarget(bot,targetSeat){
  const p=seatOf(targetSeat); if(!bot||!p)return{kind:'suspect',level:'low',key:'suspectLow',reason:'無明確資料'};
  ensureMind(bot);
  const st=getSpeechStats(targetSeat);
  let score=beliefWolfProb(bot,targetSeat);
  let reason='發言、身分機率與票型綜合判讀';
  if(p.revealed==='wolf')return{kind:'suspect',level:'high',key:'suspectHigh',reason:'已被證實為狼人'};
  if(p.revealed==='good')return{kind:'trust',level:'high',key:'trustHigh',reason:'已被證實為好人'};
  if(isPublicWitchInfoSeat(targetSeat)&&!hasWitchCounterClaim())return{kind:'trust',level:trainingLevel('witchPushed')>=2?'high':'mid',key:trainingLevel('witchPushed')>=2?'trustHigh':'trustMid',reason:'公開女巫且已報用藥，無對跳前不能當低資訊牌推'};
  if(isProtectedSoloSeer(bot,p))return{kind:'trust',level:'mid',key:'trustMid',reason:'唯一預言家暫時保留'};
  const cred=credOf(bot,targetSeat);
  if(cred>=0.75){const lv=allowedTrustLevel(bot,targetSeat,'high');return{kind:'trust',level:lv,key:lv==='high'?'trustHigh':'trustMid',reason:lv==='high'?'身分可信度高':'可信但未到可擔保'};}
  if(cred>=0.62&&score<0.54)return{kind:'trust',level:'mid',key:'trustMid',reason:'身分可信度中高'};
  if(st){
    if(st.falseAccuse>0){score+=0.18;reason='曾錯誤指控低資訊玩家';}
    if(st.hardPushTargets.length&&G.day===1){score+=0.10;reason='首日推人較急';}
    if(st.overGuaranteeTargets.length){score+=0.08;reason='未知身分過度擔保'}
  }
  const fakeSeerLinks=G.players.filter(q=>q.revealed==='wolf'&&q.claim==='預言家'&&(q.claimChecks||[]).some(c=>c.target===targetSeat&&!c.wolf));
  if(fakeSeerLinks.length){score+=0.22+trainingBias('noSeerChain',0.04);reason='被已證假預言家發過金水';}
  const chainHits=G.aiJudgements.filter(j=>j.type==='seerChainConfirmed'&&j.target===targetSeat);
  if(chainHits.some(j=>j.kind==='wolf')){score+=0.55;reason=chainHits.find(j=>j.kind==='wolf')?.reason||'已證假預翻牌後，真預言家查殺鏈成立';}
  if(confirmedGoodSeerClaims().some(q=>(q.claimChecks||[]).some(c=>c.target===targetSeat&&c.wolf))){score+=0.70;reason='被已驗好/夜死預言家查殺，真預遺產鏈成立';}
  if(chainHits.some(j=>j.kind==='good')){score-=0.45;reason=chainHits.find(j=>j.kind==='good')?.reason||'已證假預翻牌後，真預言家金水鏈成立';}
  if(confirmedGoodSeerClaims().some(q=>(q.claimChecks||[]).some(c=>c.target===targetSeat&&!c.wolf))){score-=0.42;reason='已驗好/夜死預言家金水鏈成立';}
  const deathNotes=G.aiJudgements.filter(j=>j.type==='deathAccuse'&&j.target===targetSeat);
  if(deathNotes.length){score+=0.12+trainingBias('voteTraceWeak',0.04);reason='被死者遺言點名';}
  const voteHeat=voteTraceHeat(bot,targetSeat);
  if(voteHeat>0.08){score+=voteHeat;reason='票型追責上升';}
  const wolfEvasion=knownWolfVoteEvasionHeat(bot,targetSeat);
  if(wolfEvasion>0.08){score+=wolfEvasion;reason='沒有進已翻狼票型，需要解釋當天投票/棄票';}
  const rel=relationHeat(bot,targetSeat);
  if(rel>0.10){score+=rel;reason=strongestPersonalLine(bot,targetSeat)||'與我有直接攻防，需回應他的踩票邏輯';}
  if(isCautiousSupportSeat(targetSeat)&&!hasHardSuspicionReason(bot,targetSeat)){
    score=Math.min(score,0.34);
    reason='保留式站邊或暫時偏信，不構成狼點';
  }
  const rc=playerReasoningCredit(targetSeat);
  if(rc.notes.length&&(rc.trust-rc.suspicion)>0.08)reason=rc.notes[0]+'，暫時不應優先出';
  if(rc.notes.length&&(rc.suspicion-rc.trust)>0.10)reason=rc.notes[0]+'，票型/推理需要追責';
  if(G.day===1&&isLowInfoOrCautiousSeat(targetSeat)&&!hasHardSuspicionReason(bot,targetSeat)){
    score=Math.min(score,0.36-trainingBias('lowInfoMob',0.03));
    reason='首日低資訊/保留式發言，不能重踩';
  }
  if(score>=0.76)return{kind:'suspect',level:'high',key:'suspectHigh',reason};
  if(score>=0.56)return{kind:'suspect',level:'mid',key:'suspectMid',reason};
  if(score<=0.18)return{kind:'trust',level:'mid',key:'trustMid',reason:'懷疑度低且暫無矛盾'};
  if(score<=0.28)return{kind:'trust',level:'low',key:'trustLow',reason:'暫時偏好'};
  return{kind:'suspect',level:'low',key:'suspectLow',reason};
}
function topTrusted(bot){
  ensureMind(bot);
  const cand=alive().filter(p=>p.seat!==bot.seat&&p.revealed!=='wolf'&&canDiscussSeatNow(p.seat));
  if(!cand.length)return null;
  cand.sort((a,b)=>((beliefWolfProb(bot,a.seat))-credOf(bot,a.seat))-((beliefWolfProb(bot,b.seat))-credOf(bot,b.seat)));
  const j=judgementForTarget(bot,cand[0].seat);
  return j.kind==='trust'?cand[0].seat:null;
}
function recordDeathNote(bySeat,text){
  const a=analyzeSpeechText(text);
  a.accused.forEach(t=>{if(t!==bySeat)G.aiJudgements.push({day:G.day,type:'deathAccuse',by:bySeat,target:t,reason:'死者遺言點名'});});
}

/* ---------- 版面：座位環 ---------- */
function buildSeats(){
  const wrap=$('tableWrap');
  wrap.querySelectorAll('.seat').forEach(e=>e.remove());
  const W=wrap.clientWidth,H=wrap.clientHeight;
  const rx=Math.min(W/2-70,420), ry=Math.min(H/2-64,300);
  G.players.forEach((p,i)=>{
    const ang=-Math.PI/2+i*(Math.PI*2/Math.max(1,G.players.length));
    const el=document.createElement('div');
    el.className='seat'+(p.isHuman?' human':'');
    el.id='seat'+p.seat;
    el.style.left=(W/2+Math.cos(ang)*rx)+'px';
    el.style.top=(H/2+Math.sin(ang)*ry)+'px';
    el.innerHTML=`<div class="avatar">${avatarHtml(p.avatar)}<div class="num">${p.seat}</div></div>
      <div class="voteHint" id="voteHint${p.seat}"></div>
      <div class="nm"><b>${p.seat}號</b> ${p.name}</div><div class="tags" id="tags${p.seat}"></div>`;
    wrap.appendChild(el);
  });
  refreshSeats();
}
function voteHintTextForSeat(seat){
  const panel=G.lastVotePanel;
  if(!panel||!panel.votes)return '';
  if(!Object.prototype.hasOwnProperty.call(panel.votes,seat))return '';
  const v=panel.votes[seat];
  if(v==='NO')return `上票：無票權`;
  if(v===null||v===undefined)return `上票：棄`;
  return `上票：${v}號`;
}
function renderVoteHintForSeat(p){
  const el=$('voteHint'+p.seat); if(!el)return;
  const txt=voteHintTextForSeat(p.seat);
  el.textContent=txt;
  el.classList.toggle('show',!!txt);
  el.classList.toggle('voteAbstain',/棄|無票權/.test(txt));
  if(G.lastVotePanel?.day)el.title=`第${G.lastVotePanel.day}天上一白天票型：${txt}`;
}
function setLastVotePanel(day,voteMap,eliminated=null,eliminatedVotes=0){
  G.lastVotePanel={day,votes:{...voteMap},eliminated,eliminatedVotes};
  refreshSeats();
}
function privateVisionClasses(p){
  const h=G.human;
  const cls=[];
  if(!h)return cls;
  if(h.alive&&isWolf(h)&&isWolf(p))cls.push('wolfVision');
  if(h.alive&&h.role==='SEER'&&h.checked&&Object.prototype.hasOwnProperty.call(h.checked,p.seat)){
    cls.push(h.checked[p.seat]?'seerWolfVision':'seerGoodVision');
  }
  if(h.alive&&h.role==='WITCH'){
    if(h.savedSeat===p.seat)cls.push('witchSilverVision');
    if(h.poisonedSeat===p.seat)cls.push('witchPoisonVision');
  }
  return cls;
}
function privateVisionTags(p){
  const h=G.human;
  const tags=[];
  if(!h||!h.alive)return tags;
  if(isWolf(h)&&isWolf(p))tags.push(`<span class="tag wolfTag">${p.seat===h.seat?'我':'狼隊'}</span>`);
  if(h.role==='SEER'&&h.checked&&Object.prototype.hasOwnProperty.call(h.checked,p.seat)){
    tags.push(`<span class="tag ${h.checked[p.seat]?'wolfTag':'goodTag'}">我驗${h.checked[p.seat]?'狼':'好'}</span>`);
  }
  if(h.role==='WITCH'){
    if(h.savedSeat===p.seat)tags.push(`<span class="tag goodTag">我銀水</span>`);
    if(h.poisonedSeat===p.seat)tags.push(`<span class="tag wolfTag">我毒藥</span>`);
  }
  return tags;
}
function refreshSeats(){
  G.players.forEach(p=>{
    const el=$('seat'+p.seat); if(!el)return;
    el.classList.remove('wolfVision','seerGoodVision','seerWolfVision','witchSilverVision','witchPoisonVision');
    privateVisionClasses(p).forEach(c=>el.classList.add(c));
    el.classList.toggle('dead',!p.alive);
    const tags=[];
    if(humanCanSeeAllRoles()){
      const r=ROLES[p.role];
      tags.push(`<span class="tag ${r.team==='wolf'?'wolfTag':'goodTag'}">${r.icon}${r.name}</span>`);
    }
    privateVisionTags(p).forEach(t=>tags.push(t));
    if(p.claim)tags.push(`<span class="tag">跳${p.claim}</span>`);
    publicInfoForSeat(p.seat).forEach(info=>{
      const cls=(info.type==='seerKill'||info.type==='witchPoison'||info.type==='knightWolf')?'wolfTag':'goodTag';
      tags.push(`<span class="tag ${cls}" title="${escapeHtml(info.full)}">${escapeHtml(info.short)}</span>`);
    });
    if(p.revealed==='wolf')tags.push(`<span class="tag wolfTag">狼人·已證</span>`);
    if(p.revealed==='good')tags.push(`<span class="tag goodTag">好人·已證</span>`);
    $('tags'+p.seat).innerHTML=tags.join('');
    renderVoteHintForSeat(p);
  });
  renderInfoPanel();
}

function log(html,cls=''){

  $('log').appendChild(d);$('log').scrollTop=$('log').scrollHeight;
}
function sys(t,cls=''){
  if(cls===true)cls='important';
  if(cls==='sys nightSys')cls='nightSys';
  log(t,'sys'+(cls?' '+cls:''));
}
const nightSys=t=>log(t,'sys nightSys');

function logPlainText(){
  const lines=[];
  lines.push(`月蝕之村紀事｜第${G.day}天｜${G.playerCount}人｜板子：${boardSummary()}｜AI模式：${G.fairMode?'公平':'導演'}｜API：${apiReady()?(activeApiSlots().length+' API / '+activeApiSlots().map(a=>a.model).join(', ')+'｜LLM：'+llmModeLabel()):'離線'}｜特訓：${trainingSummary()}｜經驗：${botBrainSummary()}`);
  document.querySelectorAll('#log > *').forEach(el=>lines.push(el.innerText.trim()));
  return lines.filter(Boolean).join('\n');
}
async function copyVillageLog(){
  const text=logPlainText();
  try{await navigator.clipboard.writeText(text);sys('📋 村莊紀事已複製。');}
  catch(e){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();sys('📋 村莊紀事已複製。');}
}

  return isWolfResult?'<span class="danger">狼人</span>':'<span class="safe">好人</span>';

function publicInfoForSeat(seat){
  const infos=[];
  G.players.forEach(src=>{
    if(!src)return;
    const srcLabel=`${src.seat}號`;
    (src.claimChecks||[]).forEach(c=>{
      if(c.target===seat){
        infos.push({type:c.wolf?'seerKill':'seerGold',
          short:`${src.seat}預${c.wolf?'殺':'金'}`,
          full:`${srcLabel}（預言家）${c.wolf?'查殺':'金水'}${seat}號`});
      }
    });
    if(src.claim==='通靈師'&&(src.claimInfo||'').includes(`${seat}號`)){
      const m=(src.claimInfo||'').match(new RegExp(`${seat}號真實身分是([^；，、\s]+)`));
      infos.push({type:'spirit',short:`${src.seat}通靈`,full:`${srcLabel}（通靈師）查${seat}號${m?('真身分='+m[1]):'真實身分'}`});
    }
    if(src.claim==='女巫'){
      if(src.savedSeat===seat)infos.push({type:'witchSilver',short:`${src.seat}女銀`,full:`${srcLabel}（女巫）銀水${seat}號`});
      if(src.poisonedSeat===seat)infos.push({type:'witchPoison',short:`${src.seat}女毒`,full:`${srcLabel}（女巫）毒過${seat}號`});
    }
    if(src.claim==='騎士'&&src.knightDuelSeat===seat){
      infos.push({type:src.knightDuelResult==='wolf'?'knightWolf':'knightGood',short:`${src.seat}騎驗${src.knightDuelResult==='wolf'?'狼':'好'}`,full:`${srcLabel}（騎士）決鬥驗出${seat}號${src.knightDuelResult==='wolf'?'狼人':'好人'}`});
    }
  });
  return infos;
}
function publicInfoSummaryLines(){
  const lines=[];
  G.players.forEach(p=>{
    const infos=publicInfoForSeat(p.seat);
    if(infos.length)lines.push(`${p.seat}號：${infos.map(x=>x.full).join('；')}`);
  });
  return lines;
}
function renderPublicInfoBlock(){

}

/* ---------- 懷疑度引擎 ---------- */
/* 每個bot：susp[座位]∈[0.02,0.98]、cred[跳神者座位]∈[0,1]、性格參數 */
function initMind(p){
  const tc=boardTeamCounts(G.roleCounts||DEFAULT_COUNTS);
  const wolfPrior=clamp((tc.wolf||3)/Math.max(1,(tc.total||G.playerCount)),0.08,0.55);
  p.susp={};p.cred={};p.belief={};p.keyQuotes={};p.voteRead={};p.hate={};p.pressure={};p.personalMemory={};p.strategyLog=[];
  G.players.forEach(q=>{
    if(q.seat===p.seat)return;
    p.susp[q.seat]=clamp(wolfPrior+(Math.random()-0.5)*0.08,0.06,0.88);
    p.cred[q.seat]=0.5;
    p.belief[q.seat]={wolf:p.susp[q.seat],good:1-p.susp[q.seat],seer:0,spirit:0,witch:0,hunter:0,knight:0,idiot:0,villager:0,notes:[]};
    p.keyQuotes[q.seat]=[];
    p.voteRead[q.seat]={pushed:0,defended:0,voted:0,followed:0};
    p.hate[q.seat]=0;
    p.pressure[q.seat]=0;
    p.personalMemory[q.seat]=[];
  });
}
function ensureMind(bot){
  if(!bot||bot.isHuman)return bot;
  if(!bot.susp||!bot.cred||!bot.belief||!bot.keyQuotes||!bot.voteRead||!bot.hate||!bot.pressure||!bot.personalMemory)initMind(bot);
  alive().forEach(q=>{
    if(q.seat===bot.seat)return;
    if(!(q.seat in bot.susp))bot.susp[q.seat]=0.3;
    if(!(q.seat in bot.cred))bot.cred[q.seat]=0.5;
    if(!bot.belief[q.seat])bot.belief[q.seat]={wolf:bot.susp[q.seat]??0.3,good:1-(bot.susp[q.seat]??0.3),seer:0,spirit:0,witch:0,hunter:0,knight:0,idiot:0,villager:0,notes:[]};
    if(!bot.keyQuotes[q.seat])bot.keyQuotes[q.seat]=[];
    if(!bot.voteRead[q.seat])bot.voteRead[q.seat]={pushed:0,defended:0,voted:0,followed:0};
    if(!bot.hate)bot.hate={};
    if(!bot.pressure)bot.pressure={};
    if(!bot.personalMemory)bot.personalMemory={};
    if(!(q.seat in bot.hate))bot.hate[q.seat]=0;
    if(!(q.seat in bot.pressure))bot.pressure[q.seat]=0;
    if(!bot.personalMemory[q.seat])bot.personalMemory[q.seat]=[];
  });
  return bot;
}
function addMindNote(bot,seat,note,weight=0){
  if(!bot||bot.isHuman||!seat||seat===bot.seat)return;
  ensureMind(bot);
  const arr=bot.keyQuotes[seat]||(bot.keyQuotes[seat]=[]);
  const txt=String(note||'').replace(/\s+/g,' ').slice(0,72);
  if(!txt)return;
  if(!arr.some(x=>x.text===txt))arr.push({day:G.day,text:txt,weight});
  if(arr.length>6)arr.splice(0,arr.length-6);
  const b=bot.belief[seat];if(b){b.notes=b.notes||[];if(!b.notes.includes(txt))b.notes.push(txt);if(b.notes.length>5)b.notes.shift();}
}
function adjSusp(bot,target,delta,reason=''){
  if(!bot||bot.isHuman)return;
  ensureMind(bot);
  if(bot.seat===target||!(target in bot.susp))return;
  bot.susp[target]=clamp(bot.susp[target]+delta,0.02,0.98);
  if(bot.belief&&bot.belief[target]){bot.belief[target].wolf=bot.susp[target];bot.belief[target].good=1-bot.susp[target];}
  if(reason)addMindNote(bot,target,reason,delta);
}

function personalityHateFactor(bot){
  const p=bot?.pers||{};
  return clamp(0.75+(p.paranoia||0.4)*0.55+(p.agg||0.4)*0.35-(p.trust||0.4)*0.20,0.55,1.55);
}
function personalityPressureFactor(bot){
  const p=bot?.pers||{};
  return clamp(0.85+(p.paranoia||0.4)*0.35-(p.trust||0.4)*0.15,0.65,1.35);
}
function addPersonalMemory(bot,seat,note,weight=0){
  if(!bot||bot.isHuman||!seat||seat===bot.seat)return;
  ensureMind(bot);
  const arr=bot.personalMemory[seat]||(bot.personalMemory[seat]=[]);
  const txt=String(note||'').replace(/\s+/g,' ').slice(0,88);
  if(!txt)return;
  if(!arr.some(x=>x.text===txt&&x.day===G.day))arr.push({day:G.day,text:txt,weight});
  if(arr.length>10)arr.splice(0,arr.length-10);
  addMindNote(bot,seat,txt,weight*0.35);
}
function addHate(bot,sourceSeat,delta,reason=''){
  if(!bot||bot.isHuman||!sourceSeat||sourceSeat===bot.seat)return;
  ensureMind(bot);
  const d=delta*personalityHateFactor(bot);
  bot.hate[sourceSeat]=clamp((bot.hate[sourceSeat]||0)+d,0,1.5);
  if(d>0)addPersonalMemory(bot,sourceSeat,`對我施壓：${reason||'攻防衝突'}`,d);
  if(d>0.05)adjSusp(bot,sourceSeat,Math.min(0.20,d*0.28),reason||'與我有直接攻防');
}
function addPressure(bot,sourceSeat,delta,reason=''){
  if(!bot||bot.isHuman)return;
  ensureMind(bot);
  const key=sourceSeat&&sourceSeat!==bot.seat?sourceSeat:'public';
  const d=delta*personalityPressureFactor(bot);
  bot.pressure[key]=clamp((bot.pressure[key]||0)+d,0,1.8);
  if(sourceSeat&&sourceSeat!==bot.seat)addPersonalMemory(bot,sourceSeat,`我被推進焦點：${reason||'被踩/被票'}`,d);
}
function pressureOf(bot){
  if(!bot||bot.isHuman)return 0;
  ensureMind(bot);
  return clamp(Object.values(bot.pressure||{}).reduce((a,b)=>a+(+b||0),0),0,2.5);
}
function hateOf(bot,seat){ensureMind(bot);return clamp(bot?.hate?.[seat]||0,0,1.5);}
function pressureFrom(bot,seat){ensureMind(bot);return clamp(bot?.pressure?.[seat]||0,0,1.8);}
function relationHeat(bot,seat){

}
function strongestPersonalLine(bot,seat){

function decayDailyRelations(){

    Object.keys(bot.pressure||{}).forEach(k=>{bot.pressure[k]=clamp(bot.pressure[k]*0.68,0,1.8);if(bot.pressure[k]<0.025)bot.pressure[k]=0;});
  });
}
function attackersAgainstSeat(seat){
  const out=[];
  G.players.forEach(p=>{
    if(p.seat===seat)return;
    (p.claimChecks||[]).forEach(c=>{if(c.target===seat&&c.wolf)out.push({seat:p.seat,type:'查殺',reason:`${p.seat}號報${seat}號查殺`});});
  });
  (G.speechBriefs||[]).slice(-50).forEach(b=>{if((b.suspects||[]).includes(seat))out.push({seat:b.seat,type:'踩我',reason:`${b.seat}號發言點名${seat}號`});});
  const last=(G.voteHistory||[]).slice(-1)[0];
  (last?.ballots||[]).forEach(b=>{if(b.t===seat)out.push({seat:b.v,type:'投我',reason:`上一輪${b.v}號投${seat}號`});});
  const uniq=[]; const seen=new Set();
  out.forEach(x=>{const k=x.seat+'-'+x.type;if(!seen.has(k)){seen.add(k);uniq.push(x);}});
  return uniq;
}
function strongestAttackerAgainst(bot){
  if(!bot||bot.isHuman)return null;
  ensureMind(bot);
  const attackers=attackersAgainstSeat(bot.seat).filter(x=>seatOf(x.seat)?.alive);
  if(!attackers.length)return null;
  attackers.sort((a,b)=>(hateOf(bot,b.seat)+pressureFrom(bot,b.seat)+(b.type==='查殺'?0.5:0))-(hateOf(bot,a.seat)+pressureFrom(bot,a.seat)+(a.type==='查殺'?0.5:0)));
  return attackers[0];
}
function hasRespondedToAttack(bot,text){
  const raw=String(text||'');
  if(/查殺|不認|反打|踩我|打我|投我|票我|表水|我不是狼|不是狼|悍跳|假預|身份|身分/.test(raw))return true;
  const at=attackersAgainstSeat(bot.seat);
  return at.some(x=>new RegExp(`${x.seat}\\s*號`).test(raw));
}
function evaluatePressureResponse(p,text){
  if(!p||!p.alive)return;
  const attackers=attackersAgainstSeat(p.seat);
  const black=attackers.some(x=>x.type==='查殺');
  const hardPressure=pressureOf(p)>0.55||black||attackers.length>=2;
  if(!hardPressure)return;
  const a=analyzeSpeechText(text);
  const responded=hasRespondedToAttack(p,text);
  if(responded){
    if(!p.isHuman){attackers.forEach(x=>{p.pressure[x.seat]=Math.max(0,(p.pressure[x.seat]||0)-0.22);});}
    return;
  }
  if(a.isLowInfo||/過麥|先過|觀望|資訊還少|先潛/.test(String(text||''))){
    alive().filter(bot=>!bot.isHuman&&!isWolf(bot)&&bot.seat!==p.seat).forEach(bot=>{
      adjSusp(bot,p.seat,black?0.32:0.18,'被查殺/被多人踩卻沒有正面表水');
      addMindNote(bot,p.seat,`${p.seat}號在高壓位沒有回應攻擊，像逃避表水`,0.20);
    });
    G.aiJudgements.push({day:G.day,type:'pressureNoResponse',by:p.seat,target:p.seat,reason:'被查殺/被踩後沒有正面回應'});
  }
}
function forcedPersonalResponse(bot){
  if(!bot||bot.isHuman)return null;

  const at=strongestAttackerAgainst(bot);
  const p=pressureOf(bot);
  if(!at||p<0.42)return null;
  const target=at.seat;
  const isBlack=at.type==='查殺';
  let fb,desc;
  if(isBlack){
    fb=offlineSay('counterCheck',{t:target});
    desc=`你被${target}號查殺/重踩，現在不能潛水，必須正面表水並反打${target}號；只引用公開資訊，不要暴露未公開身分。`;
  }else if(p>0.75||hateOf(bot,target)>0.55){

}

function credOf(bot,claimant){ensureMind(bot);return bot?.cred?.[claimant]??0.5;}
function roleBeliefFromClaimName(name){

function isSeerLikeClaim(p){return p&&(p.claim==='預言家'||p.claim==='通靈師'||G.seerClaims.includes(p.seat));}
function isRevealedFakeSeerClaim(p){return !!(p&&isSeerLikeClaim(p)&&p.revealed==='wolf');}
function knownFakeSeerClaims(){return G.players.filter(isRevealedFakeSeerClaim);}
function isConfirmedGoodSeerClaim(p){
  if(!p||!isSeerLikeClaim(p)||isRevealedFakeSeerClaim(p))return false;
  // 公開資訊足以讓好人重盤：騎士驗好/公開翻好，或跳預言家後被夜刀。
  if(p.revealed==='good')return true;
  if(!p.alive&&p.deathCause==='knife')return true;
  return false;
}
function confirmedGoodSeerClaims(){return G.players.filter(isConfirmedGoodSeerClaim);}
function seerClaimWeight(bot,claimSeat){
  const p=seatOf(claimSeat); if(!p||!isSeerLikeClaim(p))return 0;
  if(isRevealedFakeSeerClaim(p))return 0;
  let w=credOf(bot,claimSeat);
  // 被騎士/公開翻牌驗好，或跳預言家後被夜刀，這張預言家牌的遺產要強制進入硬鏈。
  if(isConfirmedGoodSeerClaim(p))w=Math.max(w,p.deathCause==='knife'?0.96:0.92);
  // 若某張預言家牌曾被已證假預言家查殺，這張預言家鏈可信度要大幅回升。
  const fakeHit=knownFakeSeerClaims().some(f=>(f.claimChecks||[]).some(c=>c.target===claimSeat&&c.wolf));
  if(fakeHit)w=Math.max(w,0.92);
  // 場上只要出現已證假預，其他預言家/通靈師報過的鏈都不能再當普通低資訊看待。
  if(knownFakeSeerClaims().some(f=>f.seat!==claimSeat))w=Math.max(w,0.78);
  if(!p.alive&&p.deathCause==='vote'&&fakeHit)w=Math.max(w,0.95);
  return clamp(w,0,1);
}
function seerChainWolfModifier(bot,seat){
  let d=0;
  G.players.forEach(q=>{
    if(!isSeerLikeClaim(q))return;
    const hit=(q.claimChecks||[]).find(c=>c.target===seat);
    if(!hit)return;
    if(isRevealedFakeSeerClaim(q)){
      d+=hit.wolf?-0.34:0.50; // 已證假預：查殺反保、金水反踩。
      return;
    }
    const w=seerClaimWeight(bot,q.seat);
    if(w>=0.72)d+=hit.wolf?0.62*w:-0.45*w;
    else if(w>=0.56)d+=hit.wolf?0.34*w:-0.22*w;
  });
  return clamp(d,-0.65,0.85);
}
function trueSeerLegacyTargets(bot){
  ensureMind(bot);
  const out=[];
  confirmedGoodSeerClaims().forEach(q=>{
    (q.claimChecks||[]).forEach(c=>{
      const t=seatOf(c.target);
      if(!c.wolf||!t||!t.alive||t.seat===bot.seat||t.revealed==='good'||isProtectedPublicInfoSeat(bot,t))return;
      out.push({seat:t.seat,score:1.25+seerChainWolfModifier(bot,t.seat)+voteTraceHeat(bot,t.seat)+(bot.susp?.[t.seat]||0)*0.12,by:q.seat});
    });
  });
  out.sort((a,b)=>b.score-a.score);
  return out;
}

// v0.6.28：預言家鏈「復盤後必須執行」。
// 之前 AI 會口頭復誦「1號預言家：查殺3、7」，但投票又跑去5號這種感覺票。
// 這裡把已驗好/夜死預言家的查殺改成硬性行動目標，尤其是 AI 自己已經在發言中復盤過預言家鏈時。
function hardTrueSeerLegacyTargets(bot){
  ensureMind(bot);
  const rows=[];
  confirmedGoodSeerClaims().forEach(q=>{
    (q.claimChecks||[]).forEach(c=>{
      const t=seatOf(c.target);
      if(!c.wolf||!t||!t.alive||t.seat===bot.seat||t.revealed==='good')return;
      if(isProtectedPublicInfoSeat(bot,t))return;
      let score=2.10;
      const qWeight=seerClaimWeight(bot,q.seat);
      score+=qWeight*0.80;
      if(q.revealed==='good')score+=0.35;
      if(q.deathCause==='knife')score+=0.35;
      if(G.players.some(f=>isRevealedFakeSeerClaim(f)&&(f.claimChecks||[]).some(x=>x.target===t.seat&&!x.wolf)))score+=0.45;
      if(G.players.some(f=>isSeerLikeClaim(f)&&f.seat!==q.seat&&(f.claimChecks||[]).some(x=>x.target===t.seat&&!x.wolf)))score+=0.18;
      score+=Math.max(0,seerChainWolfModifier(bot,t.seat))*0.70;
      score+=Math.min(0.45,voteTraceHeat(bot,t.seat))*0.40;
      rows.push({seat:t.seat,score,by:q.seat,reason:`${q.seat}號已驗好/夜死預言家查殺${t.seat}號`});
    });
  });
  const merged=[];
  rows.forEach(r=>{
    const old=merged.find(x=>x.seat===r.seat);
    if(old){old.score=Math.max(old.score,r.score);old.reason+='；'+r.reason;}
    else merged.push({...r});
  });
  merged.sort((a,b)=>b.score-a.score);
  return merged;
}
function recitedSeerChainToday(bot){

function seerChainObligationTarget(bot){

  const top=list[0];
  // 已經被騎士驗好或夜死的預言家，其查殺不是普通懷疑；好人不能再用低資訊、票型感覺去蓋過。
  if(top.score>=2.10)return top.seat;
  // 如果這名 AI 自己發言復盤了預言家鏈，就必須按自己復盤的結論投票。
  if(recitedSeerChainToday(bot)&&top.score>=1.45)return top.seat;

function seerChainObligationReason(bot,targetSeat){

  if(!row)return '';
